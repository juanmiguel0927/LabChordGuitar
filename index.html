<!DOCTYPE html>
<html lang="es">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; scroll-behavior: smooth; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .snap-x::-webkit-scrollbar { height: 6px; }
        .snap-x::-webkit-scrollbar-track { background: #0f172a; border-radius: 10px; }
        .snap-x::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 10px; }

        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }

        .jpeg-is-exporting {
            width: 1800px !important; 
            max-width: 1800px !important;
            min-width: 1800px !important;
            margin: 0 auto !important;
            padding: 60px 80px !important;
            background-color: #020617 !important;
            box-sizing: border-box !important;

        .jpeg-is-exporting .print-grid-wrap {
            display: flex !important;
            flex-wrap: wrap !important;
            justify-content: center !important;
            align-items: flex-start !important;
            gap: 50px !important; 
        }
        
        .jpeg-is-exporting .print-grid-wrap > div {
            flex: 0 0 calc(25% - 50px) !important; 
            max-width: calc(25% - 50px) !important;
        }
    </style>
</head>
<body class="pb-32">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        const Icon = function(props) {
            const name = props.name;
            const size = props.size || 24;
            const className = props.className || "";
            const icons = {
                GraduationCap: <g><path d="M22 10v6M2 10l10-5 10 5-10 5zM6 12v5c3 3 9 3 12 0v-5"/></g>,

                Shuffle: <g><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></g>,
                Layers: <g><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></g>,
                Play: <g><polygon points="5 3 19 12 5 21 5 3"/></g>,

                ArrowLeft: <g><path d="M19 12H5M12 19l-7-7 7-7"/></g>,
                CheckCircle2: <g><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM9 12l2 2 4-4"/></g>,

                Target: <g><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></g>,

                Forward: <g><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></g>,
                Lock: <g><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></g>,
                Music: <g><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></g>,
                Flame: <g><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></g>,
                Printer: <g><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></g>,
                Volume2: <g><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></g>,
                VolumeX: <g><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></g>,
                Trash2: <g><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></g>,
                Plus: <g><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></g>,
                Info: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></g>,
                X: <g><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></g>,
                Eye: <g><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></g>,
                EyeOff: <g><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></g>,
                Save: <g><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></g>,
                Bookmark: <g><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></g>,
                Menu: <g><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></g>,
                Search: <g><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></g>,
                Edit2: <g><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></g>,
                CheckCircle: <g><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></g>,
                Image: <g><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></g>,
                Download: <g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></g>,
                UploadCloud: <g><polyline points="16 16 12 12 8 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path><polyline points="16 16 12 12 8 16"></polyline></g>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const ChordNameDisplay = function({ name, className }) {
            if (!name) return null;
            const match = name.match(/^(.*?)\((.*?)\)(.*?)$/);
            
            if (!match) return <span className={className}>{name}</span>;

            const base = match[1];
            const tensionsStr = match[2];
            const suffix = match[3];

            const tensions = tensionsStr.split(',').map(t => t.trim());
            tensions.sort((a, b) => {
                const getNum = str => parseInt(str.replace(/\D/g, '')) || 0;
                return getNum(b) - getNum(a);
            });

            return (
                <div className={`inline-flex items-center align-middle ${className || ''}`}>
                    <span>{base}</span>
                    <span className="text-[1.4em] font-light mx-[2px] leading-none text-slate-300 translate-y-[-1px]">(</span>
                    <div className="flex flex-col text-[0.8em] leading-[1.1] text-center justify-center font-black tracking-tighter">
                        {tensions.map((t, i) => <span key={i}>{t}</span>)}
                    </div>
                    <span className="text-[1.4em] font-light mx-[2px] leading-none text-slate-300 translate-y-[-1px]">)</span>
                    <span>{suffix}</span>
                </div>
            );
        };

        const CustomModal = function({ config, onClose }) {
            if (!config.isOpen) return null;
            const [inputValue, setInputValue] = useState(config.defaultValue || '');

            useEffect(function() {
                setInputValue(config.defaultValue || '');
            }, [config]);

            const handleConfirm = function() {
                if (config.type === 'prompt') {
                    if (config.onConfirm) config.onConfirm(inputValue);
                } else if (config.type === 'confirm') {
                    if (config.onConfirm) config.onConfirm(true);
                } else {
                    if (config.onConfirm) config.onConfirm();
                }
                onClose();
            };

            const handleCancel = function() {
                if (config.type === 'confirm' && config.onCancel) config.onCancel(false);
                onClose();
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm print:hidden">
                    <div className="bg-slate-900 border border-slate-700 rounded-3xl p-6 md:p-8 max-w-md w-full shadow-2xl relative animate-in zoom-in-95">
                        <h3 className="text-xl font-bold text-amber-500 mb-4 flex items-center gap-2">
                            {config.type === 'alert' ? <Icon name="AlertCircle" size={24}/> : config.type === 'confirm' ? <Icon name="Info" size={24}/> : <Icon name="Edit2" size={24}/>}
                            {config.type === 'alert' ? 'Aviso' : config.type === 'confirm' ? 'Confirmación' : 'Entrada Requerida'}
                        </h3>
                        <p className="text-slate-300 mb-6">{config.message}</p>
                        
                        {config.type === 'prompt' && (
                            <input 
                                type="text" 
                                className="w-full bg-[#0f172a] border border-slate-700 p-3 rounded-xl text-white font-bold focus:ring-2 ring-amber-500 outline-none transition-all mb-6"
                                value={inputValue}
                                onChange={function(e) { setInputValue(e.target.value); }}
                                autoFocus
                            />
                        )}

                        <div className="flex justify-end gap-3">
                            {(config.type === 'confirm' || config.type === 'prompt') && (
                                <button type="button" onClick={handleCancel} className="px-5 py-2.5 rounded-xl font-bold bg-slate-800 text-slate-300 hover:bg-slate-700 transition-colors">Cancelar</button>
                            )}
                            <button type="button" onClick={handleConfirm} className="px-5 py-2.5 rounded-xl font-bold bg-amber-500 text-slate-950 hover:bg-amber-400 transition-colors">Aceptar</button>
                        </div>
                    </div>
                </div>
            );
        };

        const PdfHeader = function({ title }) {
            return (
                <div className="pdf-header text-center mb-10 pt-4" style={{display: 'none'}}>
                    <div className="flex justify-center mb-4 text-amber-500"><Icon name="GraduationCap" size={64} /></div>
                    <h1 className="text-5xl font-black text-slate-100">Laboratorio de Acordes</h1>
                    {title && <h2 className="text-2xl font-bold text-amber-500 mt-3">{title}</h2>}
                    <p className="pdf-date text-slate-400 mt-3 font-bold text-lg"></p>
                </div>
            );
        };

        const PdfFooter = function() {
            return (
                <div className="pdf-footer text-center mt-16 pb-4 border-t-2 border-slate-800 pt-8 w-full" style={{display: 'none'}}>
                    <p className="text-slate-500 font-bold uppercase tracking-widest text-sm">Desarrollado por Juan Miguel Rios Redondo</p>
                </div>
            );
        };

        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(function() {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { return initialValue; }
            });
            const setValue = function(value) {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {}
            };
            return [storedValue, setValue];
        }

        const Tooltip = function({ text, children }) {
            return (
                <div className="group relative inline-flex items-center justify-center">
                    {children}
                    <div className="absolute bottom-full mb-2 hidden group-hover:block w-48 p-2.5 bg-slate-800 text-slate-100 text-[10px] rounded-lg shadow-xl z-50 text-center border border-slate-700 normal-case font-medium leading-relaxed tracking-normal">
                        {text}
                        <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-800"></div>
                    </div>
                </div>
            );
        };

        const NOTE_TO_MIDI = { 'C': 0, 'C#': 1, 'Db': 1, 'D': 2, 'D#': 3, 'Eb': 3, 'E': 4, 'F': 5, 'F#': 6, 'Gb': 6, 'G': 7, 'G#': 8, 'Ab': 8, 'A': 9, 'A#': 10, 'Bb': 10, 'B': 11 };
        const MIDI_TO_NOTE_SHARP = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const MIDI_TO_NOTE_FLAT = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
        const DISPLAY_NOTES = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'];

        const LATIN_MAP = { 'C':'Do', 'C#':'Do#', 'Db':'Reb', 'D':'Re', 'D#':'Re#', 'Eb':'Mib', 'E':'Mi', 'F':'Fa', 'F#':'Fa#', 'Gb':'Solb', 'G':'Sol', 'G#':'Sol#', 'Ab':'Lab', 'A':'La', 'A#':'La#', 'Bb':'Sib', 'B':'Si' };
        
        const translateNote = function(noteStr, mode) {
            if (mode !== 'latin' || !noteStr) return noteStr;
            let base = noteStr.replace('m', '');
            let isMinor = noteStr.includes('m');
            return (LATIN_MAP[base] || base) + (isMinor ? 'm' : '');
        };

        const getSpelledNote = function(rootMidi, rootName, intervalMidi, explicitEnharmonic) {
            if (explicitEnharmonic === 'sharps') return MIDI_TO_NOTE_SHARP[intervalMidi];
            if (explicitEnharmonic === 'flats') return MIDI_TO_NOTE_FLAT[intervalMidi];
            
            const noteNames = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
            const rootLetter = rootName.replace(/[^A-G]/g, '');
            const rootIdx = noteNames.indexOf(rootLetter);
            if (rootIdx === -1) return MIDI_TO_NOTE_SHARP[intervalMidi];

            const diff = (intervalMidi - rootMidi + 12) % 12;
            let targetDegree = 0;
            
            if (diff === 0) targetDegree = 0; // 1
            else if (diff === 1 || diff === 2) targetDegree = 1; // 2, b2, #2
            else if (diff === 3 || diff === 4) targetDegree = 2; // 3, b3
            else if (diff === 5 || diff === 6) targetDegree = 3; // 4, #4, b5
            else if (diff === 7) targetDegree = 4; // 5
            else if (diff === 8 || diff === 9) targetDegree = 5; // 6, b6, #5
            else if (diff === 10 || diff === 11) targetDegree = 6; // 7, b7

            if (diff === 6 && (rootName.includes('b') || rootName === 'F')) targetDegree = 4; // b5 preferido sobre #4 en tonos bemoles

            const targetLetter = noteNames[(rootIdx + targetDegree) % 7];
            
            const sharpOption = MIDI_TO_NOTE_SHARP[intervalMidi];
            const flatOption = MIDI_TO_NOTE_FLAT[intervalMidi];
            
            if (sharpOption.startsWith(targetLetter)) return sharpOption;
            if (flatOption.startsWith(targetLetter)) return flatOption;
            
            return flatOption.includes('b') ? flatOption : sharpOption;
        };

        const getBassNoteName = function(rootName, quality, intervalMidi, contextKey) {
            let useFlats = false;
            if (contextKey) {
                useFlats = ['F', 'Bb', 'Eb', 'Ab', 'Db', 'Gb', 'Cm', 'Fm', 'Gm', 'Dm', 'Bbm', 'Ebm'].indexOf(contextKey) !== -1;
            } else {
                const cleanRoot = rootName.replace('m', '');
                if (['F', 'Bb', 'Eb', 'Ab', 'Db', 'Gb'].indexOf(cleanRoot) !== -1) useFlats = true;
                if (['C', 'G', 'D'].indexOf(cleanRoot) !== -1 && (quality && (quality.indexOf('m') !== -1 || quality.indexOf('7') !== -1 || quality.indexOf('dim') !== -1))) {
                    if (cleanRoot === 'D' && quality === '7') useFlats = false; 
                    else useFlats = true; 
                }
            }
            const targetMidi = (NOTE_TO_MIDI[rootName.replace('m', '')] + intervalMidi) % 12;
            return useFlats ? MIDI_TO_NOTE_FLAT[targetMidi] : MIDI_TO_NOTE_SHARP[targetMidi];
        };

        const INVERSION_NAMES_QUADS = ['Fund.', '1ra Inv.', '2da Inv.', '3ra Inv.'];
        const INVERSION_NAMES_TRIADS = ['Fund.', '1ra Inv.', '2da Inv.'];
        const STRING_TUNINGS = [64, 59, 55, 50, 45, 40]; 

        const getScaleData = function(qualityId, degreeLabel) {
            let type = '';
            if (degreeLabel) {
                let roman = '';
                if (degreeLabel.indexOf('VII') === 0) roman = 'VII';
                else if (degreeLabel.indexOf('VI') === 0) roman = 'VI';
                else if (degreeLabel.indexOf('IV') === 0) roman = 'IV';
                else if (degreeLabel.indexOf('V') === 0) roman = 'V';
                else if (degreeLabel.indexOf('III') === 0) roman = 'III';
                else if (degreeLabel.indexOf('II') === 0) roman = 'II';
                else if (degreeLabel.indexOf('I') === 0) roman = 'I';

                const isMinorOne = roman === 'I' && degreeLabel.indexOf('m') !== -1 && degreeLabel.indexOf('maj') === -1;
                
                if (roman === 'I' && !isMinorOne) type = 'jonico';
                else if (roman === 'II') type = 'dorico';
                else if (roman === 'III') type = 'frigio';
                else if (roman === 'IV') type = 'lidio';
                else if (roman === 'V') type = 'mixolidio';
                else if (roman === 'VI' || isMinorOne) type = 'eolico';
                else if (roman === 'VII') type = 'locrio';
            }

            if (!type) {
                if (qualityId && qualityId.indexOf('maj') !== -1) type = 'jonico';
                else if (qualityId && (qualityId.indexOf('m7b5') !== -1 || qualityId.indexOf('dim') !== -1)) type = 'locrio';
                else if (qualityId && (qualityId.indexOf('m') !== -1 && qualityId.indexOf('maj') === -1)) type = 'dorico';
                else if (qualityId && qualityId.indexOf('alt') !== -1) type = 'alterado';
                else type = 'mixolidio';
            }

            const scales = {
                'jonico': [{i:0, d:'1'}, {i:2, d:'2', t:true}, {i:4, d:'3'}, {i:5, d:'4', t:true}, {i:7, d:'5'}, {i:9, d:'6', t:true}, {i:11, d:'7'}],
                'dorico': [{i:0, d:'1'}, {i:2, d:'2', t:true}, {i:3, d:'b3'}, {i:5, d:'4', t:true}, {i:7, d:'5'}, {i:9, d:'6', t:true}, {i:10, d:'b7'}],
                'frigio': [{i:0, d:'1'}, {i:1, d:'b2', t:true}, {i:3, d:'b3'}, {i:5, d:'4', t:true}, {i:7, d:'5'}, {i:8, d:'b6', t:true}, {i:10, d:'b7'}],
                'lidio': [{i:0, d:'1'}, {i:2, d:'2', t:true}, {i:4, d:'3'}, {i:6, d:'#4', t:true}, {i:7, d:'5'}, {i:9, d:'6', t:true}, {i:11, d:'7'}],
                'mixolidio': [{i:0, d:'1'}, {i:2, d:'2', t:true}, {i:4, d:'3'}, {i:5, d:'4', t:true}, {i:7, d:'5'}, {i:9, d:'6', t:true}, {i:10, d:'b7'}],
                'eolico': [{i:0, d:'1'}, {i:2, d:'2', t:true}, {i:3, d:'b3'}, {i:5, d:'4', t:true}, {i:7, d:'5'}, {i:8, d:'b6', t:true}, {i:10, d:'b7'}],
                'locrio': [{i:0, d:'1'}, {i:1, d:'b2', t:true}, {i:3, d:'b3'}, {i:5, d:'4', t:true}, {i:6, d:'b5'}, {i:8, d:'b6', t:true}, {i:10, d:'b7'}],
                'alterado': [{i:0, d:'1'}, {i:1, d:'b2', t:true}, {i:3, d:'#2', t:true}, {i:4, d:'3'}, {i:6, d:'b5'}, {i:8, d:'b6', t:true}, {i:10, d:'b7'}] 
            };
            return scales[type] || scales['jonico'];
        };

        const TRIAD_QUALITIES = [
            { id: 'maj', label: ' Mayor', intervals: [0, 4, 7] },
            { id: 'min', label: 'm', intervals: [0, 3, 7] },
            { id: 'dim', label: '°', intervals: [0, 3, 6] },
            { id: 'aug', label: '(#5)', intervals: [0, 4, 8] },
            { id: 'sus2', label: 'sus2', intervals: [0, 2, 7] },
            { id: 'sus4', label: 'sus4', intervals: [0, 5, 7] }
        ];

        const QUAD_QUALITIES = [
            { id: 'maj7', label: 'Maj7', intervals: [0, 4, 7, 11] },
            { id: '7', label: '7', intervals: [0, 4, 7, 10] },

        const applyDrop = function(notes, dropType) {
            let n = [...notes];
            if (dropType === 'open') n[1] -= 12; 
            else if (dropType === 'drop2') n[n.length-2] -= 12;
            else if (dropType === 'drop3') n[n.length-3] -= 12;
            else if (dropType === 'drop23') { n[n.length-2] -= 12; n[n.length-3] -= 12; }
            else if (dropType === 'drop24') { n[n.length-2] -= 12; n[n.length-4] -= 12; }
            else if (dropType === 'doubleDrop2Drop3') { n[n.length-2] -= 24; n[n.length-3] -= 12; }
            return n.sort(function(a,b) { return a-b; });
        };

        const getOptimalFingering = function(baseNotes, bassString, dropType, appTrack) {
            let stringIdx = bassString - 1; 
            let allowedStrings = [5, 4, 3, 2, 1, 0];
            
            let maxSpanAllowed = 4; 
            if (dropType === 'drop23' || dropType === 'drop24' || dropType === 'open') maxSpanAllowed = 5; 
            if (dropType === 'doubleDrop2Drop3' || appTrack === 'tensions') maxSpanAllowed = 6; 
            
            let validFingerings = [];
            for (let s = -3; s <= 3; s++) {
                let shiftedNotes = baseNotes.map(function(n) { return n + s * 12; });
                
                let currentResults = [];
                const search = function(noteIdx, fings) {
                    if (noteIdx === shiftedNotes.length) { 
                        validFingerings.push(fings); 
                        return; 
                    }
                    let target = shiftedNotes[noteIdx];
                    
                    let startStr = 0;
                    if (fings.length > 0) {
                        startStr = allowedStrings.indexOf(fings[fings.length-1].string) + 1; 
                    }

                    for (let i = startStr; i < allowedStrings.length; i++) {
                        if (noteIdx === 0 && allowedStrings[i] !== stringIdx) continue; 
                        
                        let sNum = allowedStrings[i];
                        let fret = target - STRING_TUNINGS[sNum];
                        if (fret > 0 && fret <= 22) { 
                            let newFings = fings.concat({ string: sNum, fret: fret, note: target });
                            let fretsInObj = newFings.map(function(f) { return f.fret; });
                            let currentSpan = 0;
                            if (fretsInObj.length > 1) {
                                currentSpan = Math.max.apply(null, fretsInObj) - Math.min.apply(null, fretsInObj);
                            }
                            if (currentSpan <= maxSpanAllowed) {
                                search(noteIdx + 1, newFings);
                            }
                        }
                    }
                };
                search(0, []);
                validFingerings = validFingerings.concat(currentResults);
            }

            if (validFingerings.length === 0) return null;
            
            validFingerings.sort(function(a,b) {
                let sA = a.map(function(f){return f.fret;});
                let sB = b.map(function(f){return f.fret;});
                let spanA = sA.length > 1 ? Math.max.apply(null, sA) - Math.min.apply(null, sA) : 0;
                let spanB = sB.length > 1 ? Math.max.apply(null, sB) - Math.min.apply(null, sB) : 0;
                if (spanA !== spanB) return spanA - spanB;
                let minA = sA.length > 0 ? Math.min.apply(null, sA) : 0;
                let minB = sB.length > 0 ? Math.min.apply(null, sB) : 0;
                return minA - minB; 
            });
            return validFingerings[0];
        };

        const getIntervalDegree = function(noteMidi, rootMidi, quality, explicitEnharmonic) {
            const diff = (noteMidi - rootMidi + 120) % 12;
            if (diff === 0) return '1';
            if (diff === 1) return explicitEnharmonic === 'sharps' ? '#1' : 'b9';
            if (diff === 2) return explicitEnharmonic === 'sharps' ? '#2' : '9';
            if (diff === 3) {
                if (explicitEnharmonic === 'sharps') return '#9';
                if (quality && (quality.indexOf('alt') !== -1 || quality.indexOf('#9') !== -1)) return '#9';
                return 'b3';
            }
            if (diff === 4) return explicitEnharmonic === 'flats' ? 'b4' : '3';
            if (diff === 5) return '11';
            if (diff === 6) {
                if (explicitEnharmonic === 'flats') return 'b5';
                if (explicitEnharmonic === 'sharps') return '#11';
                return (quality && (quality.indexOf('alt') !== -1 || quality.indexOf('b5') !== -1)) ? 'b5' : '#11';
            }
            if (diff === 7) return '5';
            if (diff === 8) {
                if (explicitEnharmonic === 'flats') return 'b13';
                if (explicitEnharmonic === 'sharps') return '#5';
                return (quality && (quality.indexOf('alt') !== -1 || quality.indexOf('b13') !== -1)) ? 'b13' : '#5';
            }
            if (diff === 9) {
                if (explicitEnharmonic === 'sharps') return '#6';
                if (quality && quality.indexOf('dim') !== -1) return 'bb7';
                if (quality && quality.indexOf('13') !== -1) return '13';
                return '6';
            }
            if (diff === 10) return 'b7';
            if (diff === 11) return '7';
            return '?';
        };

        const getInvName = function(intervalMidi, isTriad) {
            if (intervalMidi === 0) return 'Fund.';
            if (intervalMidi === 3 || intervalMidi === 4 || intervalMidi === 2) return '1ra Inv.';

            return '3ra Inv.'; 
        };

        const generateChordData = function(queryRoot, queryQuality, queryDrop, queryBassStr, trackList, contextKey, appTrack, notationMode = 'anglo') {
            if (!queryRoot || !trackList) return [];
            
            const cleanRoot = queryRoot.replace('m', '');
            const rootMidiBase = 60 + (NOTE_TO_MIDI[cleanRoot] !== undefined ? NOTE_TO_MIDI[cleanRoot] : NOTE_TO_MIDI['C']); 
            
            let qualityObj = null;
            for (let i=0; i<trackList.length; i++) {
                if (trackList[i].id === queryQuality) { qualityObj = trackList[i]; break; }
            }
            if (!qualityObj) qualityObj = trackList[0];
            
            let voicingsToProcess = [];
            let invNames = [];

            let isStrictStacks = !!qualityObj.stacks;

            if (isStrictStacks) {
                voicingsToProcess = qualityObj.stacks.map(function(stack) {
                    return stack.map(function(interval) { return rootMidiBase + interval; });
                });
                invNames = qualityObj.names;
            } else {
                const intervals = qualityObj.intervals;
                let pitches = intervals.map(function(i) { return rootMidiBase + i; });
                for (let i = 0; i < intervals.length; i++) {
                    voicingsToProcess.push(applyDrop([...pitches], queryDrop));
                    pitches[0] += 12; pitches.sort(function(a,b){return a-b;});
                }
                invNames = intervals.length === 3 ? INVERSION_NAMES_TRIADS : INVERSION_NAMES_QUADS;
            }
            
            return voicingsToProcess.map(function(dropped, i) {
                const fing = getOptimalFingering(dropped, queryBassStr, queryDrop, appTrack);
                if (!fing) return null;
                
                const intervalMidi = (dropped[0] - rootMidiBase + 120) % 12;
                const bassName = getBassNoteName(queryRoot, qualityObj.id, intervalMidi, contextKey);
                
                let labelQ = qualityObj.label.split(' (')[0];
                if (labelQ === ' Mayor' || labelQ === ' ') labelQ = '';
                
                let translatedRoot = translateNote(queryRoot, notationMode);
                let translatedBass = bassName ? translateNote(bassName, notationMode) : '';
                
                let chordName = translatedRoot + labelQ;

                if (intervalMidi !== 0 && qualityObj.id.indexOf('_rl') === -1 && qualityObj.id !== '7alt') {
                    chordName += "/" + translatedBass;
                }

                let invNameStr = '';
                if (isStrictStacks) invNameStr = qualityObj.names[i];
                else invNameStr = getInvName(intervalMidi, qualityObj.intervals && qualityObj.intervals.length === 3);
                
                return { 
                    name: invNameStr, 
                    fingering: fing, 
                    rootMidi: rootMidiBase, 
                    queryRoot: queryRoot, 
                    quality: qualityObj.id, 
                    drop: queryDrop, 
                    bassString: queryBassStr,
                    formattedChordName: chordName.replace('maj7', 'Maj7') 
                };
            }).filter(function(d) { return d !== null; });
        };

        const analyzeChord = function(notes, notationMode = 'anglo') {
            if (notes.length < 2) return [];
            
            const uniquePitches = [...new Set(notes.map(function(n) { return n.note; }))].sort(function(a, b) { return a - b; });
            const bassMidi = uniquePitches[0];
            const uniquePitchClasses = [...new Set(uniquePitches.map(function(n) { return n % 12; }))];

            let matches = [];

            const dict = [

                { id: '7#9_no5', name: '7(#9)', intervals: [0,3,4,10], score: 13 },
                { id: '7b9_no5', name: '7(b9)', intervals: [0,1,4,10], score: 13 },

                { id: 'Maj7#5_no3', name: 'Maj7(#5)', intervals: [0,8,11], score: 10 },
                { id: '7#5_no3', name: '7(#5)', intervals: [0,8,10], score: 10 },
                { id: 'Maj9#5', name: 'Maj9(#5)', intervals: [0,2,4,8,11], score: 14 },
                { id: 'add9_no5', name: 'add9', intervals: [0,2,4], score: 9 },
                { id: 'madd9_no5', name: 'm(add9)', intervals: [0,2,3], score: 9 },
                
                // Variaciones complejas 6/9
                { id: '6/9#11', name: '6/9(#11)', intervals: [0,2,4,6,7,9], score: 16 },
                { id: '6/9#11_no5', name: '6/9(#11)', intervals: [0,2,4,6,9], score: 15 },
                { id: 'm6/9', name: 'm6/9', intervals: [0,2,3,7,9], score: 14 },
                { id: 'm6/9_no5', name: 'm6/9', intervals: [0,2,3,9], score: 13 },
                { id: 'm6/9#11', name: 'm6/9(#11)', intervals: [0,2,3,6,7,9], score: 16 },
                { id: 'add9#11', name: 'add9(#11)', intervals: [0,2,4,6,7], score: 12 }
            ];

            const getNoteName = (pc, isRoot) => {
                const explicit = notes.find(n => (n.note % 12) === pc && n.explicitEnharmonic);
                const pref = explicit ? explicit.explicitEnharmonic : 'sharps';
                const arr = pref === 'flats' ? MIDI_TO_NOTE_FLAT : MIDI_TO_NOTE_SHARP;
                return translateNote(arr[pc], notationMode);
            };

            // 1. ANÁLISIS ESTÁNDAR
            uniquePitchClasses.forEach(function(rootPC) {
                let intervals = uniquePitchClasses.map(function(pc) { return (pc - rootPC + 12) % 12; });
                intervals.sort(function(a,b) { return a - b; });

                dict.forEach(function(def) {
                    let isMatch = false;
                    if (intervals.length === def.intervals.length && intervals.every(function(v, i) { return v === def.intervals[i]; })) {
                        isMatch = true;
                    }
                    if (isMatch) {
                        const rootName = getNoteName(rootPC, true);
                        const bassPC = bassMidi % 12;
                        let bassName = "";
                        if (bassPC !== rootPC) bassName = "/" + getNoteName(bassPC, false);

                        let finalScore = def.score + (bassPC === rootPC ? 5 : 0);
                        let finalDefName = def.name;
                        
                        // Traducción dinámica de cifrado basado en la intención de la nota (b13 vs #5, #11 vs b5)
                        const int8 = notes.find(n => (n.note - rootPC + 120) % 12 === 8);
                        if (int8 && int8.explicitEnharmonic === 'flats' && finalDefName.includes('#5')) {
                            finalDefName = finalDefName.replace('#5', 'b13');
                        }
                        const int6 = notes.find(n => (n.note - rootPC + 120) % 12 === 6);
                        if (int6 && int6.explicitEnharmonic === 'flats' && finalDefName.includes('#11')) {
                            finalDefName = finalDefName.replace('#11', 'b5');
                        }

                        matches.push({
                            name: rootName + finalDefName + bassName,
                            quality: finalDefName || 'Mayor',
                            root: rootName,
                            bass: bassName.replace('/', ''),
                            intervals: intervals,
                            score: finalScore,
                            rootPC: rootPC
                        });
                    }
                });
            });

            // 2. PASO POLIACORDES (Slash Chords)
            const bassPC = bassMidi % 12;
            const upperNotes = notes.filter(n => n.note % 12 !== bassPC);
            if (upperNotes.length >= 2) {
                const upperPCs = [...new Set(upperNotes.map(n => n.note % 12))].sort((a,b)=>a-b);
                upperPCs.forEach(upperRootPC => {
                    let intervals = upperPCs.map(pc => (pc - upperRootPC + 12) % 12).sort((a,b)=>a-b);
                    dict.forEach(def => {
                        if (['Maj', 'm', 'Maj7', 'm7'].includes(def.id)) {
                            if (intervals.length === def.intervals.length && intervals.every((v,i)=>v===def.intervals[i])) {
                                const upperRootName = getNoteName(upperRootPC, true);
                                const bassName = getNoteName(bassPC, false);
                                
                                let susEquivalent = '';
                                let diff = (upperRootPC - bassPC + 12) % 12;
                                if (diff === 10 && def.id === 'Maj') susEquivalent = '9sus4'; 
                                if (diff === 10 && def.id === 'Maj7') susEquivalent = '13sus4'; 
                                if (diff === 7 && def.id === 'm') susEquivalent = '7sus4'; 
                                if (diff === 7 && def.id === 'm7') susEquivalent = '9sus4'; 
                                
                                let finalName = upperRootName + def.name + '/' + bassName;
                                let qName = susEquivalent ? `Pol. (${susEquivalent})` : `Poliacorde`;
                                
                                matches.push({
                                    name: finalName,
                                    quality: qName,
                                    root: upperRootName,
                                    bass: bassName,
                                    intervals: intervals,
                                    score: def.score + 15, 
                                    rootPC: bassPC
                                });
                            }
                        }
                    });
                });
            }

            matches.sort(function(a, b) { return b.score - a.score; });
            const uniqueMatches = [];
            const seenNames = new Set();
            matches.forEach(function(m) {
                if (!seenNames.has(m.name)) { seenNames.add(m.name); uniqueMatches.push(m); }
            });
            return uniqueMatches;
        };

        const getVoiceLeadingDistance = function(source, target) {
            if (!source || !target) return Infinity;
            const sN = source.map(function(n){return n.note;}).sort(function(a,b){return a-b;});
            const tN = target.map(function(n){return n.note;}).sort(function(a,b){return a-b;});
            let d = 0; const len = Math.min(sN.length, tN.length);
            for(let i=0; i<len; i++) d += Math.abs(sN[i] - tN[i]);
            return d;
        };

        const FretboardSVG = function(props) {
            const { fingering, prevFingering, degreeLabel, name, rootMidi, formattedChordName, quality, dropLabel, options, vlRank, isSelected, isLocked, onSelect, onPlay, hideInteractive, distance, queryRoot } = props;
            const [isRevealed, setIsRevealed] = useState(false);
            
            useEffect(function() { setIsRevealed(false); }, [fingering, options.blindMode]);

            if (!fingering) return null;
            const startFret = Math.min.apply(null, fingering.map(function(f) { return f.fret; }));
            const endFret = Math.max.apply(null, fingering.map(function(f) { return f.fret; }));
            const numFrets = Math.max(5, endFret - startFret + 1); 
            
            const stringsArray = options.leftHanded ? [0, 1, 2, 3, 4, 5] : [5, 4, 3, 2, 1, 0];
            const fretsArray = [];
            for(let i=0; i<=numFrets; i++) fretsArray.push(i);
            
            let rankStyle = "", rankText = "";
            if (vlRank === 1) { rankStyle = "bg-emerald-500 text-slate-900 border-emerald-500"; rankText = "Óptimo"; }
            else if (vlRank === 2) { rankStyle = "bg-amber-500 text-slate-900 border-amber-500"; rankText = "Aceptable"; }
            else if (vlRank === 3) { rankStyle = "bg-orange-600 text-white border-orange-600"; rankText = "Salto Ligero"; }
            else if (vlRank >= 4) { rankStyle = "bg-rose-600 text-white border-rose-600"; rankText = "Salto Brusco"; }

            const noteNamesAnglo = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
            const noteNamesLatin = ['Do', 'Reb', 'Re', 'Mib', 'Mi', 'Fa', 'Solb', 'Sol', 'Lab', 'La', 'Sib', 'Si'];
            const noteNames = options.notationMode === 'latin' ? noteNamesLatin : noteNamesAnglo;

            const downloadSingle = function(e) {
                if (e) e.stopPropagation();
                const node = document.getElementById(props.id);
                if (!node) return;
                
                const originalBg = node.style.backgroundColor;
                const originalBorder = node.style.border;
                const originalTransform = node.style.transform;
                
                node.style.backgroundColor = '#0f172a';
                node.style.border = 'none';
                node.style.transform = 'none';

                const hideEls = node.querySelectorAll('.hide-on-pdf');
                hideEls.forEach(el => {
                    el.dataset.oldDisplay = el.style.display;
                    el.style.display = 'none';
                });

                window.html2canvas(node, {
                    scale: 3,
                    backgroundColor: '#0f172a',
                    logging: false
                }).then(canvas => {
                    node.style.backgroundColor = originalBg;
                    node.style.border = originalBorder;
                    node.style.transform = originalTransform;
                    hideEls.forEach(el => {
                        el.style.display = el.dataset.oldDisplay || '';
                    });

                    const imgData = canvas.toDataURL('image/jpeg', 1.0);
                    const link = document.createElement('a');
                    link.download = `Acorde_${formattedChordName ? formattedChordName.replace(/\//g, '-') : 'Diagrama'}.jpg`;
                    link.href = imgData;
                    link.click();
                });
            };

            const isBlind = options.blindMode && !isRevealed;

            // SVG Dimensions setup
            const fretHeight = 40;
            const stringSpacing = 30;
            const svgWidth = 150; // 5 strings * 30
            const svgHeight = numFrets * fretHeight;
            const effectiveRoot = props.queryRoot || options.fallbackRootName || 'C';

            return (
                <div onClick={!isLocked ? onSelect : undefined} id={props.id} className={"bg-slate-900 p-4 sm:p-5 rounded-2xl border transition-all duration-300 min-w-[240px] w-full max-w-[280px] sm:max-w-[300px] shrink-0 shadow-lg relative flex flex-col print:border-none print:shadow-none print:bg-transparent " + (!hideInteractive && !isLocked && onSelect ? 'cursor-pointer hover:border-amber-500/50 hover:shadow-amber-500/10 group ' : '') + (isSelected ? 'border-amber-500 ring-2 ring-amber-500/30 bg-slate-800 transform scale-[1.02] ' : 'border-slate-800 ') + (isLocked ? 'opacity-40 grayscale pointer-events-none ' : '')}>
                    
                    {vlRank > 0 && !isSelected && !options.hideRank && (
                        <div className={`absolute top-0 left-1/2 -translate-x-1/2 ${rankStyle} text-[10px] font-black tracking-widest px-3 py-1 rounded-b-lg shadow-md z-30 flex items-center gap-1.5 whitespace-nowrap print:hidden hide-on-pdf`}>
                            {vlRank === 1 ? <Icon name="CheckCircle2" size={12} /> : <Icon name="AlertCircle" size={12}/>} 
                            {rankText} {distance !== undefined && distance !== Infinity ? `(Mov: ${distance})` : ''}
                        </div>
                    )}

                    {!isLocked && (
                        <button onClick={downloadSingle} className="absolute top-2 left-2 text-slate-500 hover:text-emerald-400 p-1.5 bg-slate-800/80 rounded border border-slate-700 z-30 print:hidden hide-on-pdf transition-colors" title="Descargar acorde en JPEG">
                            <Icon name="Download" size={12}/>
                        </button>
                    )}

                    {isLocked && <div className="absolute inset-0 z-40 flex items-center justify-center print:hidden"><Icon name="Lock" size={32} className="text-white/40" /></div>}

                    {options.isBuilder && (
                        <div className="absolute top-2 right-2 flex justify-center gap-1 mb-2 print:hidden hide-on-pdf z-30">
                            <button onClick={function(e){ e.stopPropagation(); if(options.onEdit) options.onEdit(); }} className="text-slate-400 hover:text-amber-500 text-[9px] uppercase font-bold flex items-center gap-1 transition-colors bg-slate-800/80 px-2 py-1.5 rounded border border-slate-700">
                                 <Icon name="Edit2" size={10}/>
                            </button>
                            <button onClick={function(e){ e.stopPropagation(); if(options.onDelete) options.onDelete(); }} className="text-slate-400 hover:text-rose-500 text-[9px] uppercase font-bold flex items-center gap-1 transition-colors bg-slate-800/80 px-2 py-1.5 rounded border border-slate-700">
                                 <Icon name="Trash2" size={10}/>
                            </button>
                        </div>
                    )}

                    <div className={"flex justify-between items-start mb-4 z-10 shrink-0 " + (options.isBuilder ? "mt-4" : "mt-2")}>
                        <div className={"flex flex-col transition-all duration-300 " + (isBlind ? "opacity-20 blur-sm select-none" : "opacity-100")}>
                            <h3 className="text-slate-100 font-black text-xl tracking-tight leading-none pr-4">
                                <ChordNameDisplay name={formattedChordName} />
                            </h3>
                            <span className="text-amber-500 text-[10px] font-bold tracking-widest mt-2">{name}</span>
                            <span className="text-slate-500 text-[9px] mt-0.5">{dropLabel}</span>
                        </div>
                        {!hideInteractive && !isLocked && !options.isBuilder && (
                            <button onClick={function(e) { e.stopPropagation(); onPlay(fingering); }} className="bg-slate-800 hover:bg-amber-500 hover:text-slate-900 p-2.5 rounded-full transition-all text-slate-300 shadow-md shrink-0 ml-2 print:hidden group-hover:bg-slate-700 z-20 relative hide-on-pdf">
                                <Icon name="Play" size={12} />
                            </button>
                        )}
                        {!hideInteractive && !isLocked && options.isBuilder && (
                            <button onClick={function(e) { e.stopPropagation(); onPlay(fingering); }} className="bg-slate-800 hover:bg-amber-500 hover:text-slate-900 p-2 rounded-full transition-all text-slate-300 shadow-md shrink-0 ml-1 print:hidden group-hover:bg-slate-700 z-20 relative hide-on-pdf">
                                <Icon name="Play" size={10} />
                            </button>
                        )}
                    </div>

                    <div className="relative flex-1 flex justify-center items-center py-4 w-full px-2" style={{ minHeight: '200px' }}>
                        <div className={"w-full h-full transition-all duration-500 flex justify-center items-center " + (isBlind ? "filter blur-md grayscale" : "")}>
                            <svg viewBox={`-60 -20 ${svgWidth + 100} ${svgHeight + 40}`} width="100%" height="100%" style={{ overflow: 'visible', maxWidth: '240px' }}>
                                {/* Label del traste inicial */}
                                <g transform={`translate(-36, ${fretHeight / 2})`}>
                                    <rect x="-18" y="-14" width="36" height="24" rx="4" fill="#0f172a" stroke="#334155" strokeWidth="1.5" />
                                    <text x="0" y="1" dominantBaseline="central" textAnchor="middle" fill="#f59e0b" fontSize="13" fontWeight="900" fontFamily="Inter, sans-serif">{startFret}fr</text>
                                </g>

                                {/* Cuerdas */}
                                {stringsArray.map((sIdx, i) => (
                                    <line key={`string-${i}`} x1={i * stringSpacing} y1="0" x2={i * stringSpacing} y2={svgHeight} stroke="#64748b" strokeWidth="1.5" opacity="0.6" />
                                ))}

                                {/* Trastes */}
                                {fretsArray.map((fretIdx, i) => (
                                    <line key={`fret-${i}`} x1="0" y1={fretIdx * fretHeight} x2={svgWidth} y2={fretIdx * fretHeight} stroke="#475569" strokeWidth="2.5" />
                                ))}

                                {/* Inlays (Dots) */}
                                {[3, 5, 7, 9, 15, 17, 19].map(fret => {
                                    if (fret >= startFret && fret <= startFret + numFrets - 1) {
                                        const cy = (fret - startFret + 0.5) * fretHeight;
                                        return <circle key={`dot-${fret}`} cx={svgWidth / 2} cy={cy} r="6" fill="rgba(255,255,255,0.1)" />;
                                    }
                                    return null;
                                })}
                                {12 >= startFret && 12 <= startFret + numFrets - 1 && (
                                    <g key="dot-12">
                                        <circle cx={svgWidth * 0.3} cy={(12 - startFret + 0.5) * fretHeight} r="5" fill="rgba(255,255,255,0.1)" />
                                        <circle cx={svgWidth * 0.7} cy={(12 - startFret + 0.5) * fretHeight} r="5" fill="rgba(255,255,255,0.1)" />
                                    </g>
                                )}

                                {/* Rastro (Ghost Notes) */}
                                {!isBlind && options.showGhostNotes && prevFingering && prevFingering.map((noteData, i) => {
                                    if (noteData.fret >= startFret - 1 && noteData.fret <= startFret + numFrets) {
                                        const cx = stringsArray.indexOf(noteData.string) * stringSpacing;
                                        const cy = (noteData.fret - startFret + 0.5) * fretHeight;
                                        return <circle key={`prev-${i}`} cx={cx} cy={cy} r="14" fill="none" stroke="#38bdf8" strokeWidth="3" opacity="0.6" />;
                                    }
                                    return null;
                                })}

                                {/* Notas Principales */}
                                {fingering.map((noteData, i) => {
                                    const isRoot = (noteData.note % 12) === (rootMidi % 12);
                                    let degree = getIntervalDegree(noteData.note, rootMidi, quality, noteData.explicitEnharmonic);
                                    let isTension = degree.indexOf('2') !== -1 || degree.indexOf('4') !== -1 || degree.indexOf('6') !== -1 || degree.indexOf('9') !== -1 || degree.indexOf('11') !== -1 || degree.indexOf('13') !== -1;
                                    if (options.tensionNotation && isTension) degree = degree.replace('2', '9').replace('4', '11').replace('6', '13');
                                    
                                    const displayLabel = options.labelMode === 'intervals' ? degree : getSpelledNote(rootMidi, effectiveRoot, noteData.note % 12, noteData.explicitEnharmonic);
                                    
                                    let fill = isRoot ? '#f59e0b' : isTension ? '#0f172a' : '#0f172a';
                                    let stroke = isRoot ? '#fbbf24' : isTension ? '#d946ef' : '#475569';
                                    let textColor = isRoot ? '#020617' : isTension ? '#e879f9' : '#f8fafc';

        const InteractiveFretboard = function({ selectedNotes, onToggleNote, leftHanded, notationMode }) {
            const numFrets = 15;
            const stringsArray = leftHanded ? [0, 1, 2, 3, 4, 5] : [5, 4, 3, 2, 1, 0];
            const fretsArray = [];
            for(let i=0; i<=numFrets; i++) fretsArray.push(i);
            
            const fretHeight = 40;
            const stringSpacing = 32;
            const svgWidth = stringSpacing * 5;
            const svgHeight = numFrets * fretHeight;

            return (
                <div className="relative flex justify-center w-full mx-auto" style={{ maxWidth: '280px', minHeight: '600px' }}>
                    <svg viewBox={`-60 -10 ${svgWidth + 100} ${svgHeight + 20}`} width="100%" height="100%" style={{ overflow: 'visible' }}>
                        {/* Background Mástil */}
                        <rect x="-8" y="0" width={svgWidth + 16} height={svgHeight} fill="#2a241e" stroke="#1a1511" strokeWidth="8" rx="4" />
                        
                        {/* Etiquetas de Trastes */}
                        {fretsArray.map(fret => {
                            if (fret === 0) return null;
                            return (
                                <text key={`fl-${fret}`} x="-30" y={(fret - 0.5) * fretHeight + 1} dominantBaseline="central" textAnchor="end" fill="#64748b" fontSize="14" fontWeight="bold" fontFamily="Inter, sans-serif">{fret}</text>
                            );
                        })}
                        
                        {/* Inlays */}
                        {[3, 5, 7, 9, 15].map(fret => (
                            <circle key={`mi-${fret}`} cx={svgWidth / 2} cy={(fret - 0.5) * fretHeight} r="8" fill="rgba(148,163,184,0.15)" />
                        ))}
                        <circle cx={svgWidth * 0.3} cy={(12 - 0.5) * fretHeight} r="7" fill="rgba(148,163,184,0.15)" />
                        <circle cx={svgWidth * 0.7} cy={(12 - 0.5) * fretHeight} r="7" fill="rgba(148,163,184,0.15)" />
                        
                        {/* Cuerdas */}
                        {stringsArray.map((sIdx, i) => (
                            <line key={`is-${i}`} x1={i * stringSpacing} y1="0" x2={i * stringSpacing} y2={svgHeight} stroke="#94a3b8" strokeWidth="2" opacity="0.6" />
                        ))}
                        
                        {/* Cejilla y Trastes Metálicos */}
                        <line x1="-8" y1="0" x2={svgWidth + 8} y2="0" stroke="#cbd5e1" strokeWidth="6" />
                        {fretsArray.map(i => {
                            if (i === 0) return null;
                            return <line key={`if-${i}`} x1="-8" y1={i * fretHeight} x2={svgWidth + 8} y2={i * fretHeight} stroke="#475569" strokeWidth="3" />;
                        })}
                        
                        {/* Notas Seleccionadas e Hitboxes */}
                        {fretsArray.map(fret => {
                            return stringsArray.map(sNum => {
                                const isSelectedNote = selectedNotes.find(n => n.string === sNum && n.fret === fret);
                                const noteMidi = STRING_TUNINGS[sNum] + fret;
                                const cx = stringsArray.indexOf(sNum) * stringSpacing;
                                const cy = fret === 0 ? -12 : (fret - 0.5) * fretHeight;
                                
                                let noteName = '';
                                if (isSelectedNote) {
                                    noteName = getSpelledNote(noteMidi % 12, 'C', noteMidi % 12, isSelectedNote.explicitEnharmonic);
                                }
                                
                                return (
                                    <g key={`ig-${fret}-${sNum}`} transform={`translate(${cx}, ${cy})`} onClick={() => onToggleNote(sNum, fret, noteMidi, isSelectedNote)} style={{ cursor: 'pointer' }}>
                                        {/* Hitbox invisible */}
                                        <circle cx="0" cy="0" r="16" fill="transparent" />
                                        {/* Círculo Visible */}
                                        {isSelectedNote && (
                                            <g>
                                                <circle cx="0" cy="0" r="14" fill="#f59e0b" stroke="#fcd34d" strokeWidth="2" />
                                                <text x="0" y="1" dominantBaseline="central" textAnchor="middle" fill="#020617" fontSize="11" fontWeight="900" fontFamily="Inter, sans-serif">{noteName}</text>
                                            </g>
                                        )}
                                        {/* Efecto Hover */}
                                        {!isSelectedNote && (
                                            <circle cx="0" cy="0" r="14" fill="rgba(255,255,255,0.1)" className="opacity-0 hover:opacity-100 transition-opacity" />
                                        )}
                                    </g>
                                );
                            });
                        })}
                    </svg>
                </div>
            );
        };

            const formatNoteKey = (k) => { const base = k.replace('m', ''); return (LATIN_MAP[base] || base) + (k.includes('m') ? 'm' : ''); };

            function playVoicing(fingering) {
                if (isMuted || !fingering) return;
                if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                const ctx = audioCtxRef.current; 
                if (ctx.state === 'suspended') ctx.resume();
                const sorted = [...fingering].sort(function(a,b){return a.note-b.note;});
                const delay = audioMode === 'arpeggio' ? 0.35 : 0.05;
                sorted.forEach(function(f, i) {
                    const osc = ctx.createOscillator(), gain = ctx.createGain();
                    osc.type = 'triangle'; osc.frequency.value = 440 * Math.pow(2, (f.note-69)/12);
                    const start = ctx.currentTime + (i * delay);
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.3, start + 0.01);
                    gain.gain.exponentialRampToValueAtTime(0.001, start + 1.5);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(start); osc.stop(start+2);
                });
            }
            
            function playSingleNote(noteData) {
                if (isMuted || !noteData) return;
                if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                const ctx = audioCtxRef.current;
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator(), gain = ctx.createGain();
                osc.type = 'triangle'; osc.frequency.value = 440 * Math.pow(2, (noteData.note-69)/12);
                const start = ctx.currentTime;
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.4, start + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, start + 1.5);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(start); osc.stop(start+2);
            }

            function playClick(isAccent) {
                if (isMuted) return;
                if (!audioCtxRef.current) return;
                const ctx = audioCtxRef.current;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = isAccent ? 1200 : 800;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.005);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.05);
            }

            function downloadPDF() {
                const els = document.querySelectorAll('.pdf-export-zone');
                let targetEl = null;
                for (let i = 0; i < els.length; i++) {
                    if (els[i].offsetParent !== null) {
                        targetEl = els[i];
                        break;
                    }
                }
                
                if (!targetEl) {
                    showAlert("No hay diagramas generados para exportar en este momento.");
                    return;
                }

                targetEl.classList.add('jpeg-is-exporting');
                const originalBg = targetEl.style.backgroundColor;
                targetEl.style.backgroundColor = '#020617';
                
                const headers = targetEl.querySelectorAll('.pdf-header');
                const footers = targetEl.querySelectorAll('.pdf-footer');
                const hideEls = targetEl.querySelectorAll('.hide-on-pdf');
                const dateEls = targetEl.querySelectorAll('.pdf-date');

                const dateStr = new Date().toLocaleString();
                dateEls.forEach(d => d.innerText = "Generado el: " + dateStr);

                headers.forEach(h => h.style.display = 'block');
                footers.forEach(f => f.style.display = 'block');
                hideEls.forEach(n => {
                    n.dataset.originalDisplay = n.style.display;
                    n.style.display = 'none';
                });

                setTimeout(() => {
                    window.html2canvas(targetEl, {
                        scale: 2, 
                        useCORS: true,
                        backgroundColor: '#020617',
                        allowTaint: true,
                        logging: false
                    }).then(canvas => {
                        headers.forEach(h => h.style.display = 'none');
                        footers.forEach(f => f.style.display = 'none');
                        hideEls.forEach(n => n.style.display = n.dataset.originalDisplay || '');
                        targetEl.style.backgroundColor = originalBg;
                        targetEl.classList.remove('jpeg-is-exporting');

                        const imgData = canvas.toDataURL('image/jpeg', 0.95);
                        const { jsPDF } = window.jspdf;
                        
                        const imgProps = new jsPDF('p', 'pt', 'a4').getImageProperties(imgData);
                        const pdf = new jsPDF({
                            orientation: imgProps.width > imgProps.height ? 'l' : 'p',
                            unit: 'pt',
                            format: [imgProps.width, imgProps.height]
                        });
                        
                        pdf.addImage(imgData, 'JPEG', 0, 0, imgProps.width, imgProps.height);
                        pdf.save('Laboratorio_de_Acordes.pdf');
                        
                    }).catch(err => {
                        headers.forEach(h => h.style.display = 'none');
                        footers.forEach(f => f.style.display = 'none');
                        hideEls.forEach(n => n.style.display = n.dataset.originalDisplay || '');
                        targetEl.style.backgroundColor = originalBg;
                        targetEl.classList.remove('jpeg-is-exporting');
                        console.error("PDF Export Error:", err);
                        showAlert("Error al compilar el PDF: " + err.message);
                    });
                }, 150);

            const toggleNoteLogic = function(sNum, fret, noteMidi, existingNote, setNotesState) {
                setNotesState(function(prev) {
                    if (existingNote) {
                        const isAccidental = [1, 3, 6, 8, 10].indexOf(noteMidi % 12) !== -1;
                        if (isAccidental) {
                            if (existingNote.explicitEnharmonic === 'sharps') {
                                return prev.map(function(n) {
                                    if (n.string === sNum && n.fret === fret) return Object.assign({}, n, { explicitEnharmonic: 'flats' });
                                    return n;
                                });
                            } else {
                                return prev.filter(function(n) { return !(n.string === sNum && n.fret === fret); });
                            }
                        } else {
                            return prev.filter(function(n) { return !(n.string === sNum && n.fret === fret); });
                        }
                    }
                    const isAccidental = [1, 3, 6, 8, 10].indexOf(noteMidi % 12) !== -1;
                    return [...prev, { string: sNum, fret: fret, note: noteMidi, explicitEnharmonic: isAccidental ? 'sharps' : null }];
                });
                playSingleNote({ note: noteMidi });
            };

            function toggleReverseNote(sNum, fret, noteMidi, existingNote) { toggleNoteLogic(sNum, fret, noteMidi, existingNote, setReverseNotes); }
            function handleToggleCustomNote(sNum, fret, noteMidi, existingNote) { toggleNoteLogic(sNum, fret, noteMidi, existingNote, setCustomNotes); }

            const getIntervalName = function(notes) {

                const intervals = {

                    4: '3ra Mayor (3)', 5: '4ta Justa (4)', 6: 'Tritono (b5/#4)', 7: '5ta Justa (5)',
                    8: '6ta menor (b6)', 9: '6ta Mayor (6)', 10: '7ma menor (b7)', 11: '7ma Mayor (Maj7)',
                    12: 'Octava Perfecta (8va)', 13: '9na menor (b9)', 14: '9na Mayor (9)', 15: '9na Aumentada (#9)',
                    16: '10ma Mayor', 17: '11na Justa (11)', 18: '11na Aumentada (#11)', 19: '5ta Justa (8va arriba)',
                    20: '13ra menor (b13)', 21: '13ra Mayor (13)', 22: '7ma menor (8va arriba)', 23: '7ma Mayor (8va arriba)',
                    24: 'Doble Octava'
                };
                return intervals[diff] || `Distancia de ${diff} semitonos`;
            };

            const activePlan = appTrack === 'triads' ? STUDY_PLAN_TRIADS : appTrack === 'shells' ? STUDY_PLAN_SHELLS : appTrack === 'tensions' ? STUDY_PLAN_TENSIONS : STUDY_PLAN_QUADS;

            const studyData = useMemo(function() {
                if (!sessionActive || !activeExerciseConfig || studyChords.length === 0) return [];
                return studyChords.map(function(c, stepIdx) {
                    return generateChordData(c.root, c.quality, activeExerciseConfig.drops[stepIdx], activeExerciseConfig.basses[stepIdx], activeQuals, activeExerciseConfig.key, appTrack, notationMode);
                });
            }, [sessionActive, activeExerciseConfig, studyChords, activeQuals, appTrack, notationMode]);

            const optimalPathData = useMemo(function() {
                if (!sessionActive || !activeExerciseConfig || studyData.length === 0) return [];
                let path = []; let currentOpts = studyData[0];
                if (!currentOpts || currentOpts.length === 0) return [];
                
                let firstChord = currentOpts.find(function(o) { return o.name === activeExerciseConfig.expectedName; });
                if (!firstChord) firstChord = currentOpts[0];
                
                path.push(Object.assign({}, firstChord, { vlRank: 1, prevFingering: null }));

                for (let i = 1; i < studyData.length; i++) {
                    let nextOptsArray = studyData[i];
                    if (!nextOptsArray || nextOptsArray.length === 0) continue;
                    let prevChord = path[i-1];
                    let prevFingering = prevChord.fingering;
                    
                    let sortedOpts = nextOptsArray.map(function(o) {
                        return Object.assign({}, o, { dist: getVoiceLeadingDistance(prevFingering, o.fingering) });
                    });
                    
                    let chosen = null;
                    if (linkStrategy === 'fund_to_fund') {
                        chosen = sortedOpts.find(function(o) { return o.name === 'Fund.' || o.name.indexOf('1-') === 0 || (o.name.indexOf('3-') === 0 && o.name.indexOf('RL') !== -1); });
                    } else if (linkStrategy === 'keep_inv') {
                        chosen = sortedOpts.find(function(o) { return o.name === prevChord.name; });
                    }
                    
                    if (!chosen) {
                        sortedOpts.sort(function(a,b) { return a.dist - b.dist; });
                        chosen = sortedOpts[0];
                    }
                    
                    chosen.vlRank = 1; chosen.prevFingering = prevFingering; path.push(chosen);
                }
                return path;
            }, [studyData, activeExerciseConfig, sessionActive, linkStrategy]);

            function handleNext() {
                if (!activeExerciseConfig) return;
                if (studyInvIdx < activeExerciseConfig.maxInvs - 1) {
                    setStudyInvIdx(studyInvIdx + 1);
                } else {
                    setStudyInvIdx(0);
                    const currentPhaseObj = STUDY_PHASES[studyPhaseIdx];
                    const isMajPhase = currentPhaseObj.id.indexOf('maj') !== -1;
                    const keysList = isMajPhase ? STUDY_KEYS : STUDY_KEYS_MIN;
                    
                    if (studyKeyIdx < keysList.length - 1) {
                        setStudyKeyIdx(studyKeyIdx + 1);
                    } else {
                        setStudyKeyIdx(0);
                        if (studyPhaseIdx < STUDY_PHASES.length - 1) {
                            setStudyPhaseIdx(studyPhaseIdx + 1);
                        } else {
                            setSessionActive(false); setStudyPhaseIdx(0); setStudyKeyIdx(0); setStudyInvIdx(0); setStreak(streak + 1);

                            } else {
                                showAlert("¡MAESTRÍA ALCANZADA! Has completado todo el programa.");
                            }
                        }
                    }
                }
            }

            function toggleMetronome() {
                if (!isPlaying) {
                    if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();
                    metroState.current = { beatInMeasure: 0, beatInChord: 0, chordIdx: 0, rep: 0 };
                    setActiveChordIdx(0); setCurrentRep(0); setStudyProgressionStep(0); setIsPlaying(true);
                } else {
                    setIsPlaying(false);
                }
            }

            useEffect(function() {
                let interval = null;
                if (isPlaying) {
                    const sourceSequence = activeTab === 'study' ? optimalPathData : builderSeq;
                    interval = setInterval(function() {
                        const s = metroState.current;
                        let currentDurationMultiplier = 1;
                        if (activeTab === 'study' && studyChords[s.chordIdx] && studyChords[s.chordIdx].duration) {
                            currentDurationMultiplier = studyChords[s.chordIdx].duration;
                        }
                        const targetBeats = beatsPerChord * currentDurationMultiplier;
                        if (s.beatInChord >= targetBeats) {
                            s.beatInChord = 0; s.chordIdx++;
                            if (s.chordIdx >= sourceSequence.length) {
                                s.chordIdx = 0; s.rep++;
                                if (activeTab === 'study' && s.rep >= repetitions) {
                                    setIsPlaying(false); handleNext(); return; 
                                }
                            }
                        }
                        const isAccent = s.beatInMeasure === 0;
                        playClick(isAccent);
                        if (s.beatInChord % beatsPerMeasure === 0) {
                            if (sourceSequence[s.chordIdx]) playVoicing(sourceSequence[s.chordIdx].fingering);
                        }
                        setActiveChordIdx(s.chordIdx);
                        if (activeTab === 'study') setStudyProgressionStep(s.chordIdx);
                        setCurrentRep(s.rep);
                        s.beatInMeasure = (s.beatInMeasure + 1) % beatsPerMeasure;
                        s.beatInChord++;
                    }, 60000 / bpm);
                }
                return function() { if (interval) clearInterval(interval); };
            }, [isPlaying, bpm, beatsPerMeasure, beatsPerChord, repetitions, optimalPathData, builderSeq, activeTab, studyChords]);

            const freeAvailableBassStrings = VALID_BASS_STRINGS[freeDrop] || [6,5,4];

            const freeData = useMemo(function() {
                return generateChordData(freeRoot, freeQuality, freeDrop, freeBassString, freeQuals, null, freeTrack, notationMode);

            const customDetectedChords = useMemo(function() { return analyzeChord(customNotes, notationMode); }, [customNotes, notationMode]);

            useEffect(function() {
                if (customNotes.length > 0) {
                    const pcs = customNotes.map(function(n) { return n.note % 12; });
                    if (customRootPC === null || pcs.indexOf(customRootPC) === -1) {
                        const lowest = Math.min.apply(null, customNotes.map(function(n) { return n.note; }));
                        setCustomRootPC(lowest % 12);
                    }
                } else {
                    setCustomRootPC(null);
                }
            }, [customNotes]);

            useEffect(function() {
                if (builderSeq.length > 0) {
                    setBuilderSeq(function(prev) {
                        return prev.map(function(item) {
                            if (item.isCustom) return item; 
                            const opts = generateChordData(item.queryRoot, item.quality, item.drop, item.bassString, getQualsForTrack(item.track), null, item.track, notationMode);
                            if (opts.length === 0) return item;
                            const updated = opts.find(function(o) { return o.fingering.every(function(f, idx) { return f.note === item.fingering[idx].note && f.string === item.fingering[idx].string; }); });
                            if (updated) return Object.assign({}, item, { formattedChordName: updated.formattedChordName });
                            return item;
                        });
                    });
                }
            }, [notationMode]);

            const handleSearchOptions = useCallback(function(silent = false) {
                const currentQuals = getQualsForTrack(freeTrack);
                const opts = generateChordData(freeRoot, freeQuality, freeDrop, freeBassString, currentQuals, null, freeTrack, notationMode);
                
                if (opts.length === 0) {
                    if (!silent) showAlert("No hay digitaciones posibles sin cuerdas al aire para esa configuración.");
                    setPendingOptions([]); return;
                }
                
                let prevFingering = null;
                if (editingIndex !== null && editingIndex > 0) prevFingering = builderSeq[editingIndex - 1].fingering;
                else if (editingIndex === null && builderSeq.length > 0) prevFingering = builderSeq[builderSeq.length - 1].fingering;

                if (prevFingering) {
                    opts.forEach(function(o) { o.dist = getVoiceLeadingDistance(prevFingering, o.fingering); o.prevFingering = prevFingering; });
                    opts.forEach(function(o) { if (o.dist <= 2) o.vlRank = 1; else if (o.dist <= 5) o.vlRank = 2; else if (o.dist <= 9) o.vlRank = 3; else o.vlRank = 4; });
                    opts.sort(function(a,b) { if (a.vlRank !== b.vlRank) return a.vlRank - b.vlRank; return a.dist - b.dist; });
                } else {
                    opts.forEach(function(o) { o.dist = 0; o.vlRank = 0; o.prevFingering = null; });
                }
                setPendingOptions(opts);
            }, [freeTrack, freeRoot, freeQuality, freeDrop, freeBassString, notationMode, builderSeq, editingIndex]);

            const updateVoiceLeadingLabelsOnly = function(seq, startIndex) {
                 let newSeq = [...seq];
                 for(let i = startIndex; i < newSeq.length; i++) {
                     let prevFingering = i > 0 ? newSeq[i-1].fingering : null;
                     if (prevFingering) {
                         const dist = getVoiceLeadingDistance(prevFingering, newSeq[i].fingering);
                         let vlRank = 0;
                         if (dist <= 2) vlRank = 1; else if (dist <= 5) vlRank = 2; else if (dist <= 9) vlRank = 3; else vlRank = 4;
                         newSeq[i] = Object.assign({}, newSeq[i], { dist: dist, prevFingering: prevFingering, vlRank: vlRank });
                     } else {
                         newSeq[i] = Object.assign({}, newSeq[i], { dist: 0, prevFingering: null, vlRank: 0 });
                     }
                 }
                 return newSeq;
            };

            function handleSelectPendingOption(chordData) {
                let newSeq = [...builderSeq];
                const finalChord = Object.assign({}, chordData, { track: freeTrack });
                if (editingIndex !== null) {
                    newSeq[editingIndex] = finalChord;

                } else {
                    newSeq.push(finalChord);

                let newSeq = builderSeq.filter(function(_, i) { return i !== idx; });
                if (newSeq.length > 0 && idx < newSeq.length) {
                    newSeq = updateVoiceLeadingLabelsOnly(newSeq, Math.max(0, idx));
