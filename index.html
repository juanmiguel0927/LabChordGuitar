                }
                setBuilderSeq(newSeq); setPendingOptions([]);
                if (editingIndex === idx) setEditingIndex(null);
            }

            function addCustomChordToBuilder() {
                if (customNotes.length === 0) return showAlert("Debes seleccionar al menos una nota.");
                
                let finalRootMidi = 60; let intervalName = 'Personalizado'; let finalQuality = '';

                const rootNotes = customNotes.filter(n => n.note % 12 === customRootPC);
                if (rootNotes.length > 0) finalRootMidi = Math.min(...rootNotes.map(n => n.note));
                else finalRootMidi = Math.min(...customNotes.map(n => n.note));

                const rootMatches = customRootPC !== null ? customDetectedChords.filter(m => m.rootPC === customRootPC) : customDetectedChords;
                let selectedMatch = rootMatches.find(m => m.name === customName) || (rootMatches.length > 0 ? rootMatches[0] : null);

                if (selectedMatch) {
                    finalQuality = selectedMatch.quality;
                }

                if (customNotes.length > 0) {
                    const sortedNotes = Array.from(new Map(customNotes.map(n => [n.note, n])).values()).sort((a,b) => a.note - b.note);
                    const degrees = sortedNotes.map(n => getIntervalDegree(n.note, finalRootMidi, finalQuality, n.explicitEnharmonic));
                    intervalName = [...new Set(degrees)].join('-');
                }

                const nameToUse = customName.trim() || (selectedMatch ? selectedMatch.name : 'Personalizado');
                const newChord = {
                    isCustom: true, name: intervalName, formattedChordName: nameToUse,
                    fingering: customNotes.map(n => ({ string: n.string, fret: n.fret, note: n.note, explicitEnharmonic: n.explicitEnharmonic })),
                    prevFingering: null, dist: 0, vlRank: 0, track: 'custom', rootMidi: finalRootMidi, quality: finalQuality, queryRoot: MIDI_TO_NOTE_SHARP[finalRootMidi % 12]
                };
                
                let newSeq = [...builderSeq];
                if (editingIndex !== null) {
                    if (editingIndex > 0) {
                        const prevFingering = newSeq[editingIndex - 1].fingering;
                        newChord.prevFingering = prevFingering;
                        newChord.dist = getVoiceLeadingDistance(prevFingering, newChord.fingering);
                    } else {
                        newChord.prevFingering = null;
                        newChord.dist = 0;
                    }
                    newSeq[editingIndex] = newChord;
                    newSeq = updateVoiceLeadingLabelsOnly(newSeq, editingIndex + 1);
                    setEditingIndex(null);
                } else {
                    if (newSeq.length > 0) {
                        const prevFingering = newSeq[newSeq.length - 1].fingering;
                        newChord.prevFingering = prevFingering; newChord.dist = getVoiceLeadingDistance(prevFingering, newChord.fingering);
                    }
                    newSeq.push(newChord);
                }
                setBuilderSeq(newSeq); setShowCustomModal(false); setCustomNotes([]); setCustomName(''); setPendingOptions([]); setCustomRootPC(null);
            }

            const exportProgression = function() {
                try {
                    const lightSeq = builderSeq.map(function(c) { 
                        return { 
                            i: c.isCustom ? 1 : 0, 
                            n: c.name, 
                            fn: c.formattedChordName, 
                            f: c.fingering.map(function(f) { return f.string + ':' + f.fret + ':' + f.note + ':' + (f.explicitEnharmonic || ''); }).join(','), 
                            r: c.queryRoot, 
                            q: c.quality, 
                            rm: c.rootMidi, 
                            d: c.drop, 
                            b: c.bassString, 
                            t: c.track 
                        }; 
                    });
                    const jsonStr = JSON.stringify(lightSeq, null, 2);
                    const blob = new Blob([jsonStr], { type: "application/json" });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = `Progresion_${Date.now()}.json`;
                    link.href = url;
                    link.click();
                    URL.revokeObjectURL(url);
                } catch(e) { showAlert("Error al exportar el archivo JSON."); }
            };

            const importProgression = function() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        try {
                            const jsonStr = event.target.result;
                            const lightProg = JSON.parse(jsonStr);
                            if (lightProg && lightProg.length > 0) {
                                const fullSeq = lightProg.map(function(lc) {
                                    const fingering = lc.f.split(',').filter(Boolean).map(function(fs) {
                                        const p = fs.split(':');
                                        return { string: parseInt(p[0]), fret: parseInt(p[1]), note: parseInt(p[2]), explicitEnharmonic: p[3] || null };
                                    });
                                    return { 
                                        isCustom: lc.i === 1, name: lc.n, formattedChordName: lc.fn, fingering: fingering, prevFingering: null, dist: 0, vlRank: 0, track: lc.t, rootMidi: lc.rm, quality: lc.q, queryRoot: lc.r, drop: lc.d, bassString: lc.b

                                                        <div className="flex items-center justify-between gap-2 md:w-auto">
                                                            <span className="text-[10px] md:text-xs font-bold text-slate-300 uppercase tracking-widest">T/Acorde</span>
                                                            <input type="number" value={beatsPerChord} onChange={function(e){setBeatsPerChord(Number(e.target.value));}} className="bg-slate-800 border border-slate-700 text-white w-14 md:w-16 p-1.5 rounded-lg text-center font-bold outline-none focus:ring-1 ring-amber-500" disabled={isPlaying} />
                                                        </div>
                                                        <button type="button" onClick={toggleMetronome} className={"w-full md:w-auto ml-auto px-6 py-2.5 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition-all shadow-lg " + (isPlaying ? 'bg-rose-600 text-white hover:bg-rose-500' : 'bg-emerald-500 text-slate-950 hover:bg-emerald-400')}>
                                                            {isPlaying ? <React.Fragment><Icon name="Play" size={14}/> Detener Reproducción</React.Fragment> : <React.Fragment><Icon name="Play" size={14}/> Iniciar Playback</React.Fragment>}
                                                        </button>
                                                    </div>

                                                    <div className="flex flex-wrap justify-center gap-6 pb-6 items-stretch print-grid-wrap">
                                                        {builderSeq.map(function(data, idx) {
                                                            let dropObj = null;
                                                            const validDrops = getDropsForTrack(data.track || 'quads');
                                                            for(let k=0; k<validDrops.length; k++){ if(validDrops[k].id===data.drop){ dropObj=validDrops[k]; break; } }
                                                            const isSel = isPlaying && activeChordIdx === idx;
                                                            const isEditingThis = editingIndex === idx;
                                                            return (
                                                                <div key={idx} id={"chord-step-" + idx} className={"w-full max-w-[280px] sm:max-w-[300px] shrink-0 print:w-auto print:max-w-none print:break-inside-avoid break-inside-avoid transition-all " + (isEditingThis ? "ring-2 ring-amber-500 scale-105 rounded-2xl" : "")}>
                                                                    <div className={"text-center mb-2 font-black print:hidden hide-on-pdf " + (isSel || isEditingThis ? 'text-amber-500' : 'text-slate-500')}>Acorde {idx + 1}</div>
                                                                    <FretboardSVG {...data} id={"fb-build-" + idx} dropLabel={dropObj?dropObj.short:''} options={{labelMode, leftHanded: false, blindMode, showGhostNotes, showScales, showRootOverlay, tensionNotation, notationMode, isBuilder: true, onEdit: function() { handleEditChord(idx); setPendingOptions([]); }, onDelete: function() { handleDeleteBuilderChord(idx); }, onPlayNote: playSingleNote}} vlRank={idx===0?0:data.vlRank} distance={data.dist} isSelected={isSel || isEditingThis} onPlay={playVoicing} hideInteractive={false} />
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                    <PdfFooter />
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                        
                        {}
                        {activeTab === 'reverse' && (
                            <div className="py-8 animate-in fade-in zoom-in-95 duration-500">
                                <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-10 shadow-2xl relative max-w-5xl mx-auto flex flex-col md:flex-row gap-8">
                                    <div className="flex-1">
                                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                                            <div>
                                                <h2 className="text-2xl font-black text-amber-500 flex items-center gap-3"><Icon name="Search" size={28}/> Reconocedor de Acordes Inverso</h2>
                                                <p className="text-slate-400 text-sm mt-2">Haz clic en el diapasón interactivo para ubicar las notas. El motor analizará tu postura y te mostrará el acorde exacto.</p>
                                            </div>
                                            <div className="flex gap-2 w-full md:w-auto overflow-x-auto shrink-0 pb-2 md:pb-0">
                                                {reverseNotes.length > 0 && (
                                                    <button type="button" onClick={function(){setReverseNotes([]);}} className="text-slate-400 hover:text-rose-500 flex items-center gap-2 text-sm font-bold transition-colors bg-slate-800 px-4 py-2 rounded-xl border border-slate-700 shrink-0 shadow-md">
                                                        <Icon name="Trash2" size={16}/> Limpiar Diapasón
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                        <div className="w-full max-w-[320px] mx-auto overflow-visible py-4">
                                            <InteractiveFretboard selectedNotes={reverseNotes} onToggleNote={toggleReverseNote} leftHanded={leftHanded} notationMode={notationMode} />
                                        </div>
                                    </div>
                                    
                                    <div className="flex-1 flex flex-col justify-start bg-[#0f172a] p-6 md:p-8 rounded-2xl border border-slate-800">
                                        <h3 className="text-xs font-black uppercase tracking-widest text-slate-500 mb-6 border-b border-slate-800 pb-3">Resultados del Análisis ({reverseNotes.length} notas)</h3>
                                        
                                        {reverseNotes.length === 0 ? (
                                            <div className="flex flex-col items-center justify-center h-full text-slate-600 opacity-60 mt-10">
                                                <Icon name="Music" size={48} className="mb-4" />
                                                <p className="text-center font-bold">Selecciona notas en el diapasón para analizar.</p>
                                                <p className="text-center text-xs mt-3 bg-slate-900 p-3 rounded-xl border border-slate-800"><span className="text-amber-500">1 Clic:</span> # Sostenido <br/><span className="text-amber-500">2 Clics:</span> b Bemol <br/><span className="text-amber-500">3 Clics:</span> Borrar nota</p>
                                            </div>
                                        ) : reverseNotes.length === 1 ? (
                                            <div className="flex flex-col items-center justify-center h-full text-amber-500 mt-10 animate-in fade-in zoom-in duration-300">
                                                <Icon name="Target" size={48} className="mb-4 drop-shadow-[0_0_15px_rgba(245,158,11,0.5)]" />
                                                <h4 className="text-2xl font-black mb-2 uppercase tracking-widest">Nota Única</h4>
                                                <p className="text-4xl font-black text-slate-100">
                                                    {(() => {
                                                        const n = reverseNotes[0];
                                                        const pref = n.explicitEnharmonic || 'sharps';
                                                        const namesArray = notationMode === 'latin' ? (pref === 'flats' ? MIDI_TO_NOTE_FLAT : MIDI_TO_NOTE_SHARP).map(k => translateNote(k, 'latin')) : (pref === 'flats' ? MIDI_TO_NOTE_FLAT : MIDI_TO_NOTE_SHARP);
                                                        return namesArray[n.note % 12];
                                                    })()}
                                                </p>
                                                <p className="text-slate-500 text-sm mt-4 font-bold">Añade otra nota para calcular el intervalo.</p>
                                            </div>
                                        ) : reverseNotes.length === 2 ? (
                                            <div className="flex flex-col items-center justify-center h-full text-sky-500 mt-10 animate-in fade-in zoom-in duration-300">
                                                <Icon name="Layers" size={48} className="mb-4 drop-shadow-[0_0_15px_rgba(14,165,233,0.5)]" />
                                                <h4 className="text-2xl font-black mb-2 uppercase tracking-widest">Intervalo Analizado</h4>
                                                <p className="text-3xl font-black text-slate-100 text-center">{getIntervalName(reverseNotes)}</p>
                                                <p className="text-slate-500 text-sm mt-4 font-bold">Añade una tercera nota para formar un acorde.</p>
                                            </div>
                                        ) : detectedChords.length > 0 ? (
                                            <div className="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                                                {detectedChords.map(function(match, i) {
                                                    return (
                                                        <div key={i} className={"p-4 rounded-xl border flex justify-between items-center transition-all " + (i === 0 ? "bg-amber-500/10 border-amber-500/50 shadow-[0_0_15px_rgba(245,158,11,0.1)]" : "bg-slate-900 border-slate-700")}>
                                                            <div>
                                                                <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">{match.quality}</div>
                                                                <div className={"font-black tracking-tight " + (i === 0 ? "text-4xl text-amber-400" : "text-2xl text-slate-200")}>
                                                                    <ChordNameDisplay name={match.name} />
                                                                </div>
                                                            </div>
                                                            {i === 0 && <div className="bg-amber-500 text-slate-900 text-[10px] font-black uppercase px-3 py-1 rounded-full">Mejor Match</div>}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        ) : (
                                            <div className="flex flex-col items-center justify-center h-full text-slate-500 mt-10">
                                                <Icon name="AlertCircle" size={48} className="mb-4 opacity-50" />
                                                <p className="text-center font-bold">No se encontró una coincidencia exacta de este patrón en la base de datos de armonía jazzística.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {}
                    <footer className="fixed bottom-2 md:bottom-4 left-1/2 -translate-x-1/2 w-[98%] md:w-[95%] max-w-4xl flex flex-col items-center gap-1.5 md:gap-2 z-50 print:hidden">
                        <div className="bg-black/95 backdrop-blur-xl border border-slate-800 p-1.5 md:p-2 rounded-2xl flex flex-nowrap overflow-x-auto gap-1.5 md:gap-2 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] w-full justify-start md:justify-center no-scrollbar snap-x">
                            
                            <div className="snap-center shrink-0 border-r border-slate-800 pr-1.5 md:pr-2 mr-0.5 md:mr-1">
                                <button type="button" onClick={function(){setNotationMode(notationMode === 'anglo' ? 'latin' : 'anglo');}} className="px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold text-sky-400 border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center h-full">
                                    <Icon name="Music" size={14} className="mr-1 md:mr-1.5"/>
                                    {notationMode === 'anglo' ? 'Ver: C D E' : 'Ver: Do Re Mi'}
                                </button>
                            </div>

                            <div className="snap-center shrink-0 border-r border-slate-800 pr-1.5 md:pr-2 mr-0.5 md:mr-1">
                                <button type="button" onClick={function(){setLabelMode(labelMode==='intervals'?'notes':'intervals');}} className="px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold text-amber-500 border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center h-full">
                                    <Icon name="Layers" size={14} className="mr-1 md:mr-1.5"/>
                                    {labelMode==='intervals'?'Grados':'Notas'}
                                </button>
                            </div>

                            <Tooltip text="Nomenclatura de grados: 2-4-6 o Tensiones 9-11-13">
                                <button type="button" onClick={function(){setTensionNotation(!tensionNotation);}} className={"px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center shrink-0 snap-center h-full " + (tensionNotation ? 'text-fuchsia-400 bg-fuchsia-900/20' : 'text-slate-400')}>
                                    <span className="mr-1 md:mr-1.5 font-black text-xs">T</span>
                                    {tensionNotation ? '9-11-13' : '2-4-6'}
                                </button>
                            </Tooltip>
                            
                            <Tooltip text="Alterna entre rasgueo rápido o arpegio nota por nota.">
                                <button type="button" onClick={function(){setAudioMode(audioMode === 'strum' ? 'arpeggio' : 'strum');}} className={"px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center shrink-0 snap-center h-full " + (audioMode === 'arpeggio' ? 'text-emerald-400 bg-emerald-900/20' : 'text-slate-400')}>
                                    <Icon name="Play" size={14} className="mr-1 md:mr-1.5"/>
                                    {audioMode === 'strum' ? 'Rasgueo' : 'Arpegio'}
                                </button>
                            </Tooltip>

                            <Tooltip text="Muestra la Tónica teórica para ubicarte visualmente.">
                                <button type="button" onClick={function(){setShowRootOverlay(!showRootOverlay);}} className={"px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center shrink-0 snap-center h-full " + (showRootOverlay ? 'text-rose-400 bg-rose-900/20' : 'text-slate-400')}>
                                    <Icon name="Target" size={14} className="mr-1 md:mr-1.5"/>
                                    Tónica
                                </button>
                            </Tooltip>

                            <Tooltip text="Ilumina las notas de la escala correspondiente al acorde.">
                                <button type="button" onClick={function(){setShowScales(!showScales);}} className={"px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center shrink-0 snap-center h-full " + (showScales ? 'text-indigo-400 bg-indigo-900/20' : 'text-slate-400')}>
                                    <Icon name="Menu" size={14} className="mr-1 md:mr-1.5"/>
                                    Escala
                                </button>
                            </Tooltip>

                            <Tooltip text="Voice Leading: Muestra el rastro del acorde anterior.">
                                <button type="button" onClick={function(){setShowGhostNotes(!showGhostNotes);}} className={"px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center shrink-0 snap-center h-full " + (showGhostNotes ? 'text-sky-400 bg-sky-900/20' : 'text-slate-400')}>
                                    <Icon name="Shuffle" size={14} className="mr-1 md:mr-1.5"/>
                                    Rastro
                                </button>
                            </Tooltip>

                            <Tooltip text="Modo a ciegas: Oculta los diagramas para practicar de oído.">
                                <button type="button" onClick={function(){setBlindMode(!blindMode);}} className={"px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center shrink-0 snap-center h-full " + (blindMode ? 'text-amber-400 bg-amber-900/20' : 'text-slate-400')}>
                                    {blindMode ? <Icon name="EyeOff" size={14} className="mr-1 md:mr-1.5"/> : <Icon name="Eye" size={14} className="mr-1 md:mr-1.5"/>}
                                    Ciegas
                                </button>
                            </Tooltip>

                            <div className="snap-center shrink-0 border-l border-slate-800 pl-1.5 md:pl-2 ml-0.5 md:ml-1">
                                <button type="button" onClick={function(){setIsMuted(!isMuted);}} className={"px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center h-full " + (isMuted ? 'text-rose-500' : 'text-emerald-500')}>
                                    {isMuted ? <Icon name="VolumeX" size={14} className="mr-1 md:mr-1.5"/> : <Icon name="Volume2" size={14} className="mr-1 md:mr-1.5"/>}
                                    {isMuted ? 'Off' : 'On'}
                                </button>
                            </div>
                        </div>
                        <div className="text-slate-500/80 text-[9px] md:text-[10px] font-bold tracking-widest uppercase drop-shadow-md bg-[#020617]/50 px-3 py-1 rounded-full">
                            Por Juan Miguel Rios Redondo
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
