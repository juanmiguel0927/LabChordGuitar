<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Acordes - Conservatorio Master</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; scroll-behavior: smooth; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .snap-x::-webkit-scrollbar { height: 6px; }
        .snap-x::-webkit-scrollbar-track { background: #0f172a; border-radius: 10px; }
        .snap-x::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 10px; }

        @media print {
            body { background: white !important; color: black !important; }
            .bg-slate-950, .bg-slate-900, .bg-black { background: white !important; border: 1px solid #e2e8f0 !important; box-shadow: none !important;}
            .text-white, .text-slate-200, .text-slate-400 { color: black !important; }
            .text-amber-500 { color: #d97706 !important; font-weight: bold; }
            .border-slate-800, .border-slate-700 { border-color: #cbd5e1 !important; }
            .print\:hidden { display: none !important; }
            .print\:grid-wrap { display: grid !important; grid-template-columns: repeat(4, minmax(0, 1fr)) !important; gap: 12px !important; overflow: visible !important; justify-content: center; width: 100% !important; align-items: start !important; }
            .print\:grid-wrap > div { width: 100% !important; max-width: none !important; flex-basis: auto !important; margin: 0 !important; }
            .print\:break-inside-avoid { break-inside: avoid; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="pb-32">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const Icon = function(props) {
            const name = props.name;
            const size = props.size || 24;
            const className = props.className || "";
            const icons = {
                GraduationCap: <g><path d="M22 10v6M2 10l10-5 10 5-10 5zM6 12v5c3 3 9 3 12 0v-5"/></g>,
                BookOpen: <g><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></g>,
                Shuffle: <g><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></g>,
                Layers: <g><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></g>,
                Play: <g><polygon points="5 3 19 12 5 21 5 3"/></g>,
                ArrowRight: <g><path d="M5 12h14M12 5l7 7-7 7"/></g>,
                ArrowLeft: <g><path d="M19 12H5M12 19l-7-7 7-7"/></g>,
                CheckCircle2: <g><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM9 12l2 2 4-4"/></g>,
                AlertCircle: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></g>,
                Target: <g><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></g>,
                Clock: <g><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></g>,
                Forward: <g><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></g>,
                Lock: <g><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></g>,
                Music: <g><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></g>,
                Flame: <g><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></g>,
                Printer: <g><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></g>,
                Volume2: <g><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></g>,
                VolumeX: <g><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></g>,
                Trash2: <g><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></g>,
                Plus: <g><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></g>,
                Info: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></g>,
                X: <g><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></g>,
                Eye: <g><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></g>,
                EyeOff: <g><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></g>,
                Save: <g><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></g>,
                Bookmark: <g><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></g>,
                Menu: <g><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></g>,
                Search: <g><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></g>,
                Edit2: <g><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></g>,
                CheckCircle: <g><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></g>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const CustomModal = function({ config, onClose }) {
            if (!config.isOpen) return null;
            const [inputValue, setInputValue] = useState(config.defaultValue || '');

            useEffect(function() {
                setInputValue(config.defaultValue || '');
            }, [config]);

            const handleConfirm = function() {
                if (config.type === 'prompt') {
                    if (config.onConfirm) config.onConfirm(inputValue);
                } else if (config.type === 'confirm') {
                    if (config.onConfirm) config.onConfirm(true);
                } else {
                    if (config.onConfirm) config.onConfirm();
                }
                onClose();
            };

            const handleCancel = function() {
                if (config.type === 'confirm' && config.onCancel) config.onCancel(false);
                onClose();
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm print:hidden">
                    <div className="bg-slate-900 border border-slate-700 rounded-3xl p-6 md:p-8 max-w-md w-full shadow-2xl relative animate-in zoom-in-95">
                        <h3 className="text-xl font-bold text-amber-500 mb-4 flex items-center gap-2">
                            {config.type === 'alert' ? <Icon name="AlertCircle" size={24}/> : config.type === 'confirm' ? <Icon name="Info" size={24}/> : <Icon name="Edit2" size={24}/>}
                            {config.type === 'alert' ? 'Aviso' : config.type === 'confirm' ? 'Confirmación' : 'Entrada Requerida'}
                        </h3>
                        <p className="text-slate-300 mb-6">{config.message}</p>
                        
                        {config.type === 'prompt' && (
                            <input 
                                type="text" 
                                className="w-full bg-[#0f172a] border border-slate-700 p-3 rounded-xl text-white font-bold focus:ring-2 ring-amber-500 outline-none transition-all mb-6"
                                value={inputValue}
                                onChange={function(e) { setInputValue(e.target.value); }}
                                autoFocus
                            />
                        )}

                        <div className="flex justify-end gap-3">
                            {(config.type === 'confirm' || config.type === 'prompt') && (
                                <button onClick={handleCancel} className="px-5 py-2.5 rounded-xl font-bold bg-slate-800 text-slate-300 hover:bg-slate-700 transition-colors">Cancelar</button>
                            )}
                            <button onClick={handleConfirm} className="px-5 py-2.5 rounded-xl font-bold bg-amber-500 text-slate-950 hover:bg-amber-400 transition-colors">Aceptar</button>
                        </div>
                    </div>
                </div>
            );
        };

        const PdfHeader = function({ title }) {
            return (
                <div className="pdf-header text-center mb-10 pt-4" style={{display: 'none'}}>
                    <div className="flex justify-center mb-4 text-amber-500"><Icon name="GraduationCap" size={48} /></div>
                    <h1 className="text-4xl font-black text-slate-100">Laboratorio de Acordes</h1>
                    {title && <h2 className="text-xl font-bold text-amber-500 mt-2">{title}</h2>}
                    <p className="pdf-date text-slate-400 mt-2 font-bold"></p>
                </div>
            );
        };

        const PdfFooter = function() {
            return (
                <div className="pdf-footer text-center mt-12 pb-4 border-t border-slate-800 pt-6 w-full" style={{display: 'none'}}>
                    <p className="text-slate-500 font-bold uppercase tracking-widest text-[10px]">Desarrollado por Juan Miguel Rios Redondo</p>
                </div>
            );
        };

        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(function() {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { return initialValue; }
            });
            const setValue = function(value) {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {}
            };
            return [storedValue, setValue];
        }

        const Tooltip = function({ text, children }) {
            return (
                <div className="group relative inline-flex items-center justify-center">
                    {children}
                    <div className="absolute bottom-full mb-2 hidden group-hover:block w-48 p-2.5 bg-slate-800 text-slate-100 text-[10px] rounded-lg shadow-xl z-50 text-center border border-slate-700 normal-case font-medium leading-relaxed tracking-normal">
                        {text}
                        <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-800"></div>
                    </div>
                </div>
            );
        };

        const NOTE_TO_MIDI = { 'C': 0, 'C#': 1, 'Db': 1, 'D': 2, 'D#': 3, 'Eb': 3, 'E': 4, 'F': 5, 'F#': 6, 'Gb': 6, 'G': 7, 'G#': 8, 'Ab': 8, 'A': 9, 'A#': 10, 'Bb': 10, 'B': 11 };
        const MIDI_TO_NOTE_SHARP = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const MIDI_TO_NOTE_FLAT = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
        const DISPLAY_NOTES = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'];

        const LATIN_MAP = { 'C':'Do', 'C#':'Do#', 'Db':'Reb', 'D':'Re', 'D#':'Re#', 'Eb':'Mib', 'E':'Mi', 'F':'Fa', 'F#':'Fa#', 'Gb':'Solb', 'G':'Sol', 'G#':'Sol#', 'Ab':'Lab', 'A':'La', 'A#':'La#', 'Bb':'Sib', 'B':'Si' };
        
        const translateNote = function(noteStr, mode) {
            if (mode !== 'latin' || !noteStr) return noteStr;
            let base = noteStr.replace('m', '');
            let isMinor = noteStr.includes('m');
            return (LATIN_MAP[base] || base) + (isMinor ? 'm' : '');
        };

        const getBassNoteName = function(rootName, quality, intervalMidi, contextKey) {
            let useFlats = false;
            if (contextKey) {
                useFlats = ['F', 'Bb', 'Eb', 'Ab', 'Db', 'Gb', 'Cm', 'Fm', 'Gm', 'Dm', 'Bbm', 'Ebm'].indexOf(contextKey) !== -1;
            } else {
                const cleanRoot = rootName.replace('m', '');
                if (['F', 'Bb', 'Eb', 'Ab', 'Db', 'Gb'].indexOf(cleanRoot) !== -1) useFlats = true;
                if (['C', 'G', 'D'].indexOf(cleanRoot) !== -1 && (quality.indexOf('m') !== -1 || quality.indexOf('7') !== -1 || quality.indexOf('dim') !== -1)) {
                    if (cleanRoot === 'D' && quality === '7') useFlats = false; 
                    else useFlats = true; 
                }
            }
            const targetMidi = (NOTE_TO_MIDI[rootName.replace('m', '')] + intervalMidi) % 12;
            return useFlats ? MIDI_TO_NOTE_FLAT[targetMidi] : MIDI_TO_NOTE_SHARP[targetMidi];
        };

        const INVERSION_NAMES_QUADS = ['Fund.', '1ra Inv.', '2da Inv.', '3ra Inv.'];
        const INVERSION_NAMES_TRIADS = ['Fund.', '1ra Inv.', '2da Inv.'];
        const STRING_TUNINGS = [64, 59, 55, 50, 45, 40]; // 1ra a 6ta

        const getScaleData = function(qualityId, degreeLabel) {
            let type = '';
            if (degreeLabel) {
                let roman = '';
                if (degreeLabel.indexOf('VII') === 0) roman = 'VII';
                else if (degreeLabel.indexOf('VI') === 0) roman = 'VI';
                else if (degreeLabel.indexOf('IV') === 0) roman = 'IV';
                else if (degreeLabel.indexOf('V') === 0) roman = 'V';
                else if (degreeLabel.indexOf('III') === 0) roman = 'III';
                else if (degreeLabel.indexOf('II') === 0) roman = 'II';
                else if (degreeLabel.indexOf('I') === 0) roman = 'I';

                const isMinorOne = roman === 'I' && degreeLabel.indexOf('m') !== -1 && degreeLabel.indexOf('maj') === -1;
                
                if (roman === 'I' && !isMinorOne) type = 'jonico';
                else if (roman === 'II') type = 'dorico';
                else if (roman === 'III') type = 'frigio';
                else if (roman === 'IV') type = 'lidio';
                else if (roman === 'V') type = 'mixolidio';
                else if (roman === 'VI' || isMinorOne) type = 'eolico';
                else if (roman === 'VII') type = 'locrio';
            }

            if (!type) {
                if (qualityId.indexOf('maj') !== -1) type = 'jonico';
                else if (qualityId.indexOf('m7b5') !== -1 || qualityId.indexOf('dim') !== -1) type = 'locrio';
                else if (qualityId.indexOf('m') !== -1 && qualityId.indexOf('maj') === -1) type = 'dorico';
                else if (qualityId.indexOf('alt') !== -1) type = 'alterado';
                else type = 'mixolidio';
            }

            const scales = {
                'jonico': [{i:0, d:'1'}, {i:2, d:'2', t:true}, {i:4, d:'3'}, {i:5, d:'4', t:true}, {i:7, d:'5'}, {i:9, d:'6', t:true}, {i:11, d:'7'}],
                'dorico': [{i:0, d:'1'}, {i:2, d:'2', t:true}, {i:3, d:'b3'}, {i:5, d:'4', t:true}, {i:7, d:'5'}, {i:9, d:'6', t:true}, {i:10, d:'b7'}],
                'frigio': [{i:0, d:'1'}, {i:1, d:'b2', t:true}, {i:3, d:'b3'}, {i:5, d:'4', t:true}, {i:7, d:'5'}, {i:8, d:'b6', t:true}, {i:10, d:'b7'}],
                'lidio': [{i:0, d:'1'}, {i:2, d:'2', t:true}, {i:4, d:'3'}, {i:6, d:'#4', t:true}, {i:7, d:'5'}, {i:9, d:'6', t:true}, {i:11, d:'7'}],
                'mixolidio': [{i:0, d:'1'}, {i:2, d:'2', t:true}, {i:4, d:'3'}, {i:5, d:'4', t:true}, {i:7, d:'5'}, {i:9, d:'6', t:true}, {i:10, d:'b7'}],
                'eolico': [{i:0, d:'1'}, {i:2, d:'2', t:true}, {i:3, d:'b3'}, {i:5, d:'4', t:true}, {i:7, d:'5'}, {i:8, d:'b6', t:true}, {i:10, d:'b7'}],
                'locrio': [{i:0, d:'1'}, {i:1, d:'b2', t:true}, {i:3, d:'b3'}, {i:5, d:'4', t:true}, {i:6, d:'b5'}, {i:8, d:'b6', t:true}, {i:10, d:'b7'}],
                'alterado': [{i:0, d:'1'}, {i:1, d:'b2', t:true}, {i:3, d:'#2', t:true}, {i:4, d:'3'}, {i:6, d:'b5'}, {i:8, d:'b6', t:true}, {i:10, d:'b7'}] 
            };
            return scales[type] || scales['jonico'];
        };

        const TRIAD_QUALITIES = [
            { id: 'maj', label: ' Mayor', intervals: [0, 4, 7] },
            { id: 'min', label: 'm', intervals: [0, 3, 7] },
            { id: 'dim', label: '°', intervals: [0, 3, 6] },
            { id: 'aug', label: '(#5)', intervals: [0, 4, 8] },
            { id: 'sus2', label: 'sus2', intervals: [0, 2, 7] },
            { id: 'sus4', label: 'sus4', intervals: [0, 5, 7] }
        ];

        const QUAD_QUALITIES = [
            { id: 'maj7', label: 'Maj7', intervals: [0, 4, 7, 11] },
            { id: '7', label: '7', intervals: [0, 4, 7, 10] },
            { id: 'm7', label: 'm7', intervals: [0, 3, 7, 10] },
            { id: 'm7b5', label: 'm7b5', intervals: [0, 3, 6, 10] },
            { id: 'dim7', label: 'dim7', intervals: [0, 3, 6, 9] }
        ];

        const SHELL_QUALITIES = [
            { id: 'maj7_sh', label: 'Maj7 (Shell)', stacks: [[0, 4, 11], [0, 11, 16]], names: ['1-3-7', '1-7-3'] },
            { id: '7_sh', label: '7 (Shell)', stacks: [[0, 4, 10], [0, 10, 16]], names: ['1-3-b7', '1-b7-3'] },
            { id: 'm7_sh', label: 'm7 (Shell)', stacks: [[0, 3, 10], [0, 10, 15]], names: ['1-b3-b7', '1-b7-b3'] },
            { id: 'm7b5_sh', label: 'm7b5 (Shell)', stacks: [[0, 6, 10], [0, 10, 18]], names: ['1-b5-b7', '1-b7-b5'] } 
        ];

        const TENSION_QUALITIES = [
            { id: 'maj9', label: 'Maj9', stacks: [[0, 4, 11, 14], [0, 11, 16, 26]], names: ['1-3-7-9', '1-7-3-9'] }, 
            { id: '13', label: '13', stacks: [[0, 4, 10, 21], [0, 10, 16, 21]], names: ['1-3-b7-13', '1-b7-3-13'] }, 
            { id: 'm9', label: 'm9', stacks: [[0, 3, 10, 14], [0, 10, 15, 26]], names: ['1-b3-b7-9', '1-b7-b3-9'] }, 
            { id: 'm11', label: 'm11', stacks: [[0, 3, 10, 17], [0, 10, 15, 17]], names: ['1-b3-b7-11', '1-b7-b3-11'] }, 
            { id: '7b9', label: '7(b9)', stacks: [[0, 4, 10, 13], [0, 10, 16, 25]], names: ['1-3-b7-b9', '1-b7-3-b9'] }, 
            { id: '7alt', label: '7alt (RL)', stacks: [[4, 10, 15, 20], [10, 16, 20, 27]], names: ['3-b7-#9-b13', 'b7-3-b13-#9'] }, 
            { id: 'maj9_rl', label: 'Maj9(13) (RL)', stacks: [[4, 11, 14, 21], [11, 16, 21, 26]], names: ['3-7-9-13', '7-3-13-9'] }, 
            { id: '9_rl', label: '13(9) (RL)', stacks: [[4, 10, 14, 21], [10, 16, 21, 26]], names: ['3-b7-9-13', 'b7-3-13-9'] }, 
            { id: 'm9_rl', label: 'm9(11) (RL)', stacks: [[3, 10, 14, 17], [10, 15, 17, 26]], names: ['b3-b7-9-11', 'b7-b3-11-9'] }, 
        ];

        const TRIAD_VOICINGS = [
            { id: 'closed', label: 'Cerrada', short: 'Cerr' },
            { id: 'open', label: 'Abierta', short: 'Abie' }
        ];

        const QUAD_VOICINGS = [
            { id: 'drop2', label: 'Drop 2', short: 'D2' },
            { id: 'drop3', label: 'Drop 3', short: 'D3' },
            { id: 'drop24', label: 'Drop 2 & 4', short: 'D2&4' },
            { id: 'drop23', label: 'Drop 2 & 3', short: 'D2&3' },
            { id: 'doubleDrop2Drop3', label: 'Doble Drop 2 & Drop 3', short: 'Dd2&d3' },
        ];

        const SHELL_VOICINGS = [ { id: 'fixed', label: 'Disposición Fija', short: 'Fija' } ];
        const TENSION_VOICINGS = [ { id: 'fixed', label: 'Disposición Fija', short: 'Fija' } ];

        const applyDrop = function(notes, dropType) {
            let n = [...notes];
            if (dropType === 'open') n[1] -= 12; 
            else if (dropType === 'drop2') n[n.length-2] -= 12;
            else if (dropType === 'drop3') n[n.length-3] -= 12;
            else if (dropType === 'drop23') { n[n.length-2] -= 12; n[n.length-3] -= 12; }
            else if (dropType === 'drop24') { n[n.length-2] -= 12; n[n.length-4] -= 12; }
            else if (dropType === 'doubleDrop2Drop3') { n[n.length-2] -= 24; n[n.length-3] -= 12; }
            return n.sort(function(a,b) { return a-b; });
        };

        const getOptimalFingering = function(baseNotes, bassString, dropType, appTrack) {
            let stringIdx = bassString - 1; 
            let allowedStrings = [5, 4, 3, 2, 1, 0];
            
            let maxSpanAllowed = 4; 
            if (dropType === 'drop23' || dropType === 'drop24' || dropType === 'open') maxSpanAllowed = 5; 
            if (dropType === 'doubleDrop2Drop3' || appTrack === 'tensions') maxSpanAllowed = 6; 
            
            let validFingerings = [];
            for (let s = -3; s <= 3; s++) {
                let shiftedNotes = baseNotes.map(function(n) { return n + s * 12; });
                
                let currentResults = [];
                const search = function(noteIdx, fings) {
                    if (noteIdx === shiftedNotes.length) { 
                        validFingerings.push(fings); 
                        return; 
                    }
                    let target = shiftedNotes[noteIdx];
                    
                    let startStr = 0;
                    if (fings.length > 0) {
                        startStr = allowedStrings.indexOf(fings[fings.length-1].string) + 1; 
                    }

                    for (let i = startStr; i < allowedStrings.length; i++) {
                        if (noteIdx === 0 && allowedStrings[i] !== stringIdx) continue; 
                        
                        let sNum = allowedStrings[i];
                        let fret = target - STRING_TUNINGS[sNum];
                        if (fret > 0 && fret <= 22) { 
                            let newFings = fings.concat({ string: sNum, fret: fret, note: target });
                            let fretsInObj = newFings.map(function(f) { return f.fret; });
                            let currentSpan = 0;
                            if (fretsInObj.length > 1) {
                                currentSpan = Math.max.apply(null, fretsInObj) - Math.min.apply(null, fretsInObj);
                            }
                            if (currentSpan <= maxSpanAllowed) {
                                search(noteIdx + 1, newFings);
                            }
                        }
                    }
                };
                search(0, []);
                validFingerings = validFingerings.concat(currentResults);
            }

            if (validFingerings.length === 0) return null;
            
            validFingerings.sort(function(a,b) {
                let sA = a.map(function(f){return f.fret;});
                let sB = b.map(function(f){return f.fret;});
                let spanA = sA.length > 1 ? Math.max.apply(null, sA) - Math.min.apply(null, sA) : 0;
                let spanB = sB.length > 1 ? Math.max.apply(null, sB) - Math.min.apply(null, sB) : 0;
                if (spanA !== spanB) return spanA - spanB;
                let minA = sA.length > 0 ? Math.min.apply(null, sA) : 0;
                let minB = sB.length > 0 ? Math.min.apply(null, sB) : 0;
                return minA - minB; 
            });
            return validFingerings[0];
        };

        const getIntervalDegree = function(noteMidi, rootMidi, quality) {
            const diff = (noteMidi - rootMidi + 120) % 12;
            if (diff === 0) return '1';
            if (diff === 1) return 'b9';
            if (diff === 2) return '9';
            if (diff === 3) return (quality && (quality.indexOf('alt') !== -1 || quality.indexOf('#9') !== -1)) ? '#9' : 'b3';
            if (diff === 4) return '3';
            if (diff === 5) return '11';
            if (diff === 6) return (quality && quality.indexOf('alt') !== -1) ? '#11' : 'b5';
            if (diff === 7) return '5';
            if (diff === 8) return (quality && (quality.indexOf('alt') !== -1 || quality.indexOf('b13') !== -1)) ? 'b13' : '#5';
            if (diff === 9) return (quality && quality.indexOf('dim') !== -1) ? 'bb7' : (quality && quality.indexOf('13') !== -1 ? '13' : '6');
            if (diff === 10) return 'b7';
            if (diff === 11) return '7';
            return '?';
        };

            if (intervalMidi === 0) return 'Fund.';

            const cleanRoot = queryRoot.replace('m', '');
            const rootMidiBase = 60 + (NOTE_TO_MIDI[cleanRoot] !== undefined ? NOTE_TO_MIDI[cleanRoot] : NOTE_TO_MIDI['C']); 
            
            let qualityObj = null;
            for (let i=0; i<trackList.length; i++) {
                if (trackList[i].id === queryQuality) { qualityObj = trackList[i]; break; }
            }
            if (!qualityObj) qualityObj = trackList[0];
            
            let voicingsToProcess = [];
            let invNames = [];

            let isStrictStacks = !!qualityObj.stacks;

            if (isStrictStacks) {
                voicingsToProcess = qualityObj.stacks.map(function(stack) {
                    return stack.map(function(interval) { return rootMidiBase + interval; });
                });
                invNames = qualityObj.names;
            } else {
                const intervals = qualityObj.intervals;
                let pitches = intervals.map(function(i) { return rootMidiBase + i; });
                for (let i = 0; i < intervals.length; i++) {
                    voicingsToProcess.push(applyDrop([...pitches], queryDrop));
                    pitches[0] += 12; pitches.sort(function(a,b){return a-b;});
                }
                invNames = intervals.length === 3 ? INVERSION_NAMES_TRIADS : INVERSION_NAMES_QUADS;
            }
            
            return voicingsToProcess.map(function(dropped, i) {
                const fing = getOptimalFingering(dropped, queryBassStr, queryDrop, appTrack);
                if (!fing) return null;
                
                const intervalMidi = (dropped[0] - rootMidiBase + 120) % 12;
                const bassName = getBassNoteName(queryRoot, qualityObj.id, intervalMidi, contextKey);

                let translatedRoot = translateNote(queryRoot, notationMode);

                if (intervalMidi !== 0 && qualityObj.id.indexOf('_rl') === -1 && qualityObj.id !== '7alt') {
                    chordName += "/" + translatedBass;
                }

                let invNameStr = '';
                if (isStrictStacks) invNameStr = qualityObj.names[i];
                else invNameStr = getInvName(intervalMidi, qualityObj.intervals && qualityObj.intervals.length === 3);
                
                return { 
                    name: invNameStr, 
                    fingering: fing, 
                    rootMidi: rootMidiBase, 
                    queryRoot: queryRoot, 
                    quality: qualityObj.id, 
                    drop: queryDrop, 
                    bassString: queryBassStr,
                    formattedChordName: chordName.replace('maj7', 'Maj7')

            ];

            uniquePitchClasses.forEach(function(rootPC) {
                let intervals = uniquePitchClasses.map(function(pc) { return (pc - rootPC + 12) % 12; });
                intervals.sort(function(a,b) { return a - b; });

                dict.forEach(function(def) {
                    let isMatch = false;

                    if (intervals.length === def.intervals.length && intervals.every(function(v, i) { return v === def.intervals[i]; })) {
                        isMatch = true;
                    } else if (!isMatch && intervals.length >= 3 && def.intervals.indexOf(7) !== -1 && def.id.indexOf('_no5') === -1) {
                        const defNo5 = def.intervals.filter(function(i) { return i !== 7; });
                        if (intervals.length === defNo5.length && intervals.every(function(v, i) { return v === defNo5[i]; })) {
                            isMatch = true;
                        }
                    }

                    if (!isMatch && intervals.length >= 3 && (def.id === '13' || def.id === 'Maj13' || def.id === '11' || def.id === 'm11')) {
                        const minimalDef = def.intervals.filter(function(i) { return i !== 7 && i !== 2; }); 
                        if (intervals.length === minimalDef.length && intervals.every(function(v, i) { return v === minimalDef[i]; })) {
                            isMatch = true;
                        }
                    }

                    if (isMatch) {
                        // Encontrar la preferencia enarmónica de la tónica
                        const explicitRoot = notes.find(n => (n.note % 12) === rootPC && n.explicitEnharmonic);
                        const rootPref = explicitRoot ? explicitRoot.explicitEnharmonic : 'sharps';
                        
                        const rootRaw = rootPref === 'flats' ? MIDI_TO_NOTE_FLAT[rootPC] : MIDI_TO_NOTE_SHARP[rootPC];
                        const rootName = translateNote(rootRaw, notationMode);

                        let bassName = "";
                        const bassPC = bassMidi % 12;
                        if (bassPC !== rootPC) {
                            // Encontrar la preferencia enarmónica del bajo
                            const explicitBass = notes.find(n => (n.note % 12) === bassPC && n.explicitEnharmonic);
                            const bassPref = explicitBass ? explicitBass.explicitEnharmonic : rootPref;
                            const bassRaw = bassPref === 'flats' ? MIDI_TO_NOTE_FLAT[bassPC] : MIDI_TO_NOTE_SHARP[bassPC];
                            bassName = "/" + translateNote(bassRaw, notationMode);
                        }

                        let finalScore = def.score + (bassPC === rootPC ? 5 : 0);

                        matches.push({
                            name: rootName + def.name + bassName,
                            quality: def.name || 'Mayor',
                            root: rootName,
                            bass: bassName.replace('/', ''),
                            intervals: intervals,
                            score: finalScore
                        });
                    }
                });
            });

            matches.sort(function(a, b) { return b.score - a.score; });
            const uniqueMatches = [];
            const seenNames = new Set();
            matches.forEach(function(m) {
                if (!seenNames.has(m.name)) {
                    seenNames.add(m.name);
                    uniqueMatches.push(m);
                }
            });

            return uniqueMatches;
        };

        const getVoiceLeadingDistance = function(source, target) {
            if (!source || !target) return Infinity;
            const sN = source.map(function(n){return n.note;}).sort(function(a,b){return a-b;});
            const tN = target.map(function(n){return n.note;}).sort(function(a,b){return a-b;});
            let d = 0; const len = Math.min(sN.length, tN.length);
            for(let i=0; i<len; i++) d += Math.abs(sN[i] - tN[i]);
            return d;
        };

        const Fretboard = function(props) {
            const { fingering, prevFingering, degreeLabel, name, rootMidi, formattedChordName, quality, dropLabel, options, vlRank, isSelected, isLocked, onSelect, onPlay, hideInteractive, distance } = props;
            const [isRevealed, setIsRevealed] = useState(false);
            
            useEffect(function() {
                setIsRevealed(false);
            }, [fingering, options.blindMode]);

            if (!fingering) return null;
            const startFret = Math.min.apply(null, fingering.map(function(f) { return f.fret; }));
            const endFret = Math.max.apply(null, fingering.map(function(f) { return f.fret; }));
            const numFrets = Math.max(5, endFret - startFret + 1); 
            
            const stringsArray = options.leftHanded ? [0, 1, 2, 3, 4, 5] : [5, 4, 3, 2, 1, 0];
            const fretsArray = [];
            for(let i=0; i<=numFrets; i++) fretsArray.push(i);
            
            let rankStyle = "", rankText = "";

            else if (vlRank === 2) { rankStyle = "bg-amber-500 text-slate-900 border-amber-500"; rankText = "Enlace Aceptable"; }
            else if (vlRank === 3) { rankStyle = "bg-orange-600 text-white border-orange-600"; rankText = "Salto Ligero"; }
            else if (vlRank >= 4) { rankStyle = "bg-rose-600 text-white border-rose-600"; rankText = "Salto Brusco"; }

            const noteNamesAnglo = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
            const noteNamesLatin = ['Do', 'Reb', 'Re', 'Mib', 'Mi', 'Fa', 'Solb', 'Sol', 'Lab', 'La', 'Sib', 'Si'];
            const noteNames = options.notationMode === 'latin' ? noteNamesLatin : noteNamesAnglo;

            const renderMarkers = function() {
                const markers = [3, 5, 7, 9, 15, 17, 19];
                let elements = [];
                markers.forEach(function(fret) {
                    if (fret >= startFret && fret <= startFret + numFrets - 1) {

                        elements.push(<div key={'dot'+fret} className="absolute w-3 h-3 bg-white/10 rounded-full left-1/2 -translate-x-1/2 print:bg-black/20" style={{ top: topPos + '%', transform: 'translate(-50%, -50%)' }} />);
                    }
                });
                if (12 >= startFret && 12 <= startFret + numFrets - 1) {
                    const topPos = ((12 - startFret + 0.5) / numFrets) * 100;
                    elements.push(<div key="dot12a" className="absolute w-2.5 h-2.5 bg-white/10 rounded-full left-1/3 -translate-x-1/2 print:bg-black/20" style={{ top: topPos + '%', transform: 'translate(-50%, -50%)' }} />);
                    elements.push(<div key="dot12b" className="absolute w-2.5 h-2.5 bg-white/10 rounded-full left-2/3 -translate-x-1/2 print:bg-black/20" style={{ top: topPos + '%', transform: 'translate(-50%, -50%)' }} />);
                }
                return elements;
            };

            const isBlind = options.blindMode && !isRevealed;

            return (
                <div onClick={!isLocked ? onSelect : undefined} id={props.id} className={"bg-slate-900 p-4 sm:p-5 rounded-2xl border transition-all duration-300 min-w-[240px] w-full max-w-[280px] sm:max-w-[300px] shrink-0 shadow-lg relative flex flex-col " + (!hideInteractive && !isLocked && onSelect ? 'cursor-pointer hover:border-amber-500/50 hover:shadow-amber-500/10 group ' : '') + (isSelected ? 'border-amber-500 ring-2 ring-amber-500/30 bg-slate-800 transform scale-[1.02] ' : 'border-slate-800 ') + (isLocked ? 'opacity-40 grayscale pointer-events-none ' : '')}>
                    
                    {vlRank > 0 && !isSelected && !options.hideRank && (
                        <div className={`absolute top-0 left-1/2 -translate-x-1/2 ${rankStyle} text-[10px] font-black tracking-widest px-3 py-1 rounded-b-lg shadow-md z-30 flex items-center gap-1.5 whitespace-nowrap print:hidden hide-on-pdf`}>

                    {isLocked && <div className="absolute inset-0 z-40 flex items-center justify-center print:hidden"><Icon name="Lock" size={32} className="text-white/40" /></div>}

                            <button onClick={function(e){ e.stopPropagation(); if(options.onEdit) options.onEdit(); }} className="text-slate-400 hover:text-amber-500 text-[9px] uppercase font-bold flex items-center gap-1 transition-colors bg-slate-800/80 px-2 py-1.5 rounded border border-slate-700">

                            </button>
                            <button onClick={function(e){ e.stopPropagation(); if(options.onDelete) options.onDelete(); }} className="text-slate-400 hover:text-rose-500 text-[9px] uppercase font-bold flex items-center gap-1 transition-colors bg-slate-800/80 px-2 py-1.5 rounded border border-slate-700">
                                 <Icon name="Trash2" size={10}/>

                    <div className={"flex justify-between items-start mb-4 z-10 shrink-0 " + (options.isBuilder ? "mt-4" : "mt-2")}>

                        {!hideInteractive && !isLocked && options.isBuilder && (
                            <button onClick={function(e) { e.stopPropagation(); onPlay(fingering); }} className="bg-slate-800 hover:bg-amber-500 hover:text-slate-900 p-2 rounded-full transition-all text-slate-300 shadow-md shrink-0 ml-1 print:hidden group-hover:bg-slate-700 z-20 relative hide-on-pdf">

                            {renderMarkers()}
                            
                            <div className="absolute -left-14 text-amber-500 font-bold text-[11px] bg-slate-900/80 border border-slate-700 px-1.5 py-0.5 rounded print:text-black print:bg-transparent print:border-none z-10" style={{ top: (0.5 / numFrets * 100) + '%', transform: 'translateY(-50%)' }}>
                                {startFret}fr
                            </div>
                            
                            {stringsArray.map(function(sIdx) { return <div key={sIdx} className="w-px bg-gradient-to-r from-slate-400 to-slate-500 opacity-60 h-full relative print:bg-black/30 z-0" />; })}
                            {fretsArray.map(function(i) { return <div key={i} className="absolute w-full bg-slate-600 shadow-[0_1px_1px_rgba(0,0,0,0.2)] print:bg-black/50 print:shadow-none z-0" style={{ height: '2px', top: i === numFrets ? 'calc(100% - 2px)' : (i / numFrets * 100) + '%' }} />; })}
                            
                            {/* CAPA DE ESCALAS */}
                            {!isBlind && options.showScales && fretsArray.map(function(fretIdx) {
                                const actualFret = startFret + fretIdx;
                                if (actualFret > startFret + numFrets - 1) return null;
                                return stringsArray.map(function(sNum) {
                                    const noteMidi = STRING_TUNINGS[sNum] + actualFret;
                                    const interval = (noteMidi - rootMidi + 120) % 12;
                                    const scaleData = getScaleData(quality, degreeLabel);
                                    const scaleNote = scaleData.find(function(sd) { return sd.i === interval; });
                                    if (scaleNote) {
                                        const isFingered = fingering.some(function(f) { return f.string === sNum && f.fret === actualFret; });
                                        if (!isFingered) {
                                            let displayDegree = options.tensionNotation && scaleNote.t 
                                                ? scaleNote.d.replace('2','9').replace('4','11').replace('6','13') 
                                                : scaleNote.d;
                                            
                                            const nNameScale = noteNames[noteMidi % 12];
                                            const displayLabelScale = options.labelMode === 'intervals' ? displayDegree : nNameScale;
                                            
                                            let bgClass = scaleNote.t 
                                                ? 'bg-fuchsia-600 border border-fuchsia-400 shadow-[0_0_8px_rgba(217,70,239,0.6)]' 
                                                : 'bg-indigo-600 border border-indigo-400 shadow-[0_0_8px_rgba(99,102,241,0.6)]';
                                                
                                            return (
                                                <div key={`sc-${actualFret}-${sNum}`} className={`absolute w-[22px] h-[22px] -ml-[11px] -mt-[11px] rounded-full text-white flex items-center justify-center text-[9px] font-black print:hidden z-10 pointer-events-none ${bgClass}`} style={{ left: (stringsArray.indexOf(sNum) / 5 * 100) + '%', top: ((actualFret - startFret + 0.5) / numFrets * 100) + '%' }}>
                                                    {displayLabelScale}
                                                </div>
                                            );
                                        }
                                    }
                                    return null;
                                });
                            })}

                            {/* CAPA DE TÓNICA TEÓRICA EXTERNA */}
                            {!isBlind && options.showRootOverlay && fretsArray.map(function(fretIdx) {
                                const actualFret = startFret + fretIdx;
                                if (actualFret > startFret + numFrets - 1) return null;
                                return stringsArray.map(function(sNum) {
                                    const noteMidi = STRING_TUNINGS[sNum] + actualFret;
                                    if (noteMidi % 12 === rootMidi % 12) {
                                        const isFingered = fingering.some(function(f) { return f.string === sNum && f.fret === actualFret; });
                                        if (!isFingered) {
                                            return (
                                                <div key={`rt-${actualFret}-${sNum}`} className="absolute w-[18px] h-[18px] -ml-[9px] -mt-[9px] rounded-sm border border-rose-500/60 bg-rose-500/10 flex items-center justify-center print:hidden z-0 pointer-events-none text-[8px] font-black text-rose-400" style={{ left: (stringsArray.indexOf(sNum) / 5 * 100) + '%', top: ((actualFret - startFret + 0.5) / numFrets * 100) + '%' }}>R</div>
                                            );
                                        }
                                    }
                                    return null;
                                });
                            })}

                            {/* NOTAS FANTASMAS */}
                            {!isBlind && options.showGhostNotes && prevFingering && prevFingering.map(function(noteData, i) {
                                if (noteData.fret >= startFret - 1 && noteData.fret <= startFret + numFrets) {
                                    return (
                                        <div key={'prev'+i} className="absolute w-6 h-6 -ml-3 -mt-3 rounded-full border-[3px] border-sky-400/60 bg-transparent z-10 print:hidden pointer-events-none shadow-[0_0_10px_rgba(56,189,248,0.5)]" style={{ left: (stringsArray.indexOf(noteData.string) / 5 * 100) + '%', top: ((noteData.fret - startFret + 0.5) / numFrets * 100) + '%' }} />
                                    );
                                }
                                return null;
                            })}

                            {/* NOTAS ACTUALES */}
                            {fingering.map(function(noteData, i) {
                                const isRoot = (noteData.note % 12) === (rootMidi % 12);
                                let degree = getIntervalDegree(noteData.note, rootMidi, quality);
                                let isTension = degree.indexOf('2') !== -1 || degree.indexOf('4') !== -1 || degree.indexOf('6') !== -1 || degree.indexOf('9') !== -1 || degree.indexOf('11') !== -1 || degree.indexOf('13') !== -1;
                                
                                if (options.tensionNotation && isTension) {
                                    degree = degree.replace('2', '9').replace('4', '11').replace('6', '13');
                                }

                                const nName = noteNames[noteData.note % 12];
                                const displayLabel = options.labelMode === 'intervals' ? degree : nName;
                                
                                let colorClass = isRoot 
                                    ? 'bg-amber-500 text-slate-950 border-amber-400 print:bg-gray-300' 
                                    : isTension 
                                        ? 'bg-slate-900 text-fuchsia-400 border-fuchsia-500 print:bg-white print:text-black' 
                                        : 'bg-slate-900 text-slate-100 border-slate-600 print:bg-white print:text-black';

                                    <div key={i} onClick={function(e) { e.stopPropagation(); if(options.onPlayNote) options.onPlayNote(noteData); }} className={`absolute w-7 h-7 -ml-3.5 -mt-3.5 rounded-full flex items-center justify-center text-[10px] font-black z-20 border-2 shadow-lg print:border-black normalcase cursor-pointer hover:scale-[1.25] transition-transform ${colorClass}`} style={{ left: (stringsArray.indexOf(noteData.string) / 5 * 100) + '%', top: ((noteData.fret - startFret + 0.5) / numFrets * 100) + '%' }}>
                                        {displayLabel}
                                    </div>
                                );
                            })}

                        {isBlind && (

                                 <span className="bg-slate-800 border border-slate-700 text-white px-4 py-2 rounded-full text-xs font-bold shadow-2xl flex items-center gap-2 hover:bg-slate-700 transition-colors animate-pulse"><Icon name="Eye" size={14}/> Revelar</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const InteractiveFretboard = function({ selectedNotes, onToggleNote, leftHanded, notationMode }) {

            const noteNamesAngloFlat = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
            const noteNamesLatinSharp = ['Do', 'Do#', 'Re', 'Re#', 'Mi', 'Fa', 'Fa#', 'Sol', 'Sol#', 'La', 'La#', 'Si'];

                            </div>

                    {/* Fret Markers (Dots) */}
                    {[3, 5, 7, 9, 15].map(function(fret) {
                        return <div key={'m'+fret} className="absolute w-4 h-4 bg-slate-400/30 rounded-full left-1/2 -translate-x-1/2 pointer-events-none z-0" style={{ top: ((fret - 0.5) / numFrets) * 100 + '%' }} />;
                    })}
                    <div className="absolute w-3 h-3 bg-slate-400/30 rounded-full left-[30%] -translate-x-1/2 pointer-events-none z-0" style={{ top: ((12 - 0.5) / numFrets) * 100 + '%' }} />
                    <div className="absolute w-3 h-3 bg-slate-400/30 rounded-full left-[70%] -translate-x-1/2 pointer-events-none z-0" style={{ top: ((12 - 0.5) / numFrets) * 100 + '%' }} />

                    {/* Nut and Strings */}
                    {stringsArray.map(function(sIdx) { return <div key={sIdx} className="w-px bg-gradient-to-r from-slate-400 to-slate-500 opacity-60 h-full relative z-0 pointer-events-none" />; })}
                    <div className="absolute top-0 left-0 w-full h-1.5 bg-slate-300 shadow-md z-0 pointer-events-none" />
                    
                    {/* Frets Lines */}
                    {fretsArray.map(function(i) { 
                        if (i === 0) return null;
                        return <div key={i} className="absolute w-full bg-slate-600 shadow-[0_1px_1px_rgba(0,0,0,0.2)] z-0 pointer-events-none" style={{ height: '2px', top: (i / numFrets * 100) + '%' }} />; 
                    })}
                    
                    {/* Interactive Grid for Note Selection */}
                    {fretsArray.map(function(fret) {
                        return stringsArray.map(function(sNum) {
                            const isSelectedNote = selectedNotes.find(function(n) { return n.string === sNum && n.fret === fret; });
                            const noteMidi = STRING_TUNINGS[sNum] + fret;
                            
                            let noteName = '';
                            if (isSelectedNote) {
                                let prefToUse = isSelectedNote.explicitEnharmonic || 'sharps';
                                let namesArray = notationMode === 'latin'
                                    ? (prefToUse === 'flats' ? noteNamesLatinFlat : noteNamesLatinSharp)
                                    : (prefToUse === 'flats' ? noteNamesAngloFlat : noteNamesAngloSharp);
                                noteName = namesArray[noteMidi % 12];
                            }
                            
                            const topPos = fret === 0 ? 0 : (fret - 0.5) / numFrets * 100;

                            return (
                                <div key={`grid-${fret}-${sNum}`} 
                                     onClick={function() { onToggleNote(sNum, fret, noteMidi, isSelectedNote); }}
                                     className="absolute w-8 h-8 -ml-4 -mt-4 cursor-pointer flex items-center justify-center z-20 rounded-full hover:bg-white/10 transition-colors"
                                     style={{ left: `${(stringsArray.indexOf(sNum) / 5) * 100}%`, top: `${topPos}%` }}>

                                            {noteName}

                                </div>
                            );
                        });
                    })}
                </div>
            );
        };

        const App = function() {
            const [appTrack, setAppTrack] = useState(null); 
            const [activeTab, setActiveTab] = useState('study'); 
            const [showHelp, setShowHelp] = useState(false);
            
            const [modalConfig, setModalConfig] = useState({ isOpen: false, type: 'alert', message: '', onConfirm: null, defaultValue: '' });
            const showAlert = function(msg) { setModalConfig({ isOpen: true, type: 'alert', message: msg, onConfirm: null }); };
            const showConfirm = function(msg, onConfirm) { setModalConfig({ isOpen: true, type: 'confirm', message: msg, onConfirm: onConfirm }); };
            const showPrompt = function(msg, onConfirm) { setModalConfig({ isOpen: true, type: 'prompt', message: msg, onConfirm: onConfirm }); };
            const closeModal = function() { setModalConfig(Object.assign({}, modalConfig, { isOpen: false })); };

            const [completedTriads, setCompletedTriads] = useLocalStorage('dm_comp_triads_v24', []);
            const [completedShells, setCompletedShells] = useLocalStorage('dm_comp_shells_v24', []);
            const [completedTensions, setCompletedTensions] = useLocalStorage('dm_comp_tensions_v24', []);
            const [streak, setStreak] = useLocalStorage('dm_streak_v24', 0);
            
            const [savedProgressions, setSavedProgressions] = useLocalStorage('dm_saved_progs_v25', []);

            const [labelMode, setLabelMode] = useState('intervals');
            const [notationMode, setNotationMode] = useState('anglo'); 
            const [leftHanded, setLeftHanded] = useState(false);
            const [audioMode, setAudioMode] = useState('strum');

            function playVoicing(fingering) {
                if (isMuted || !fingering) return;
                if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                const ctx = audioCtxRef.current; 
                if (ctx.state === 'suspended') ctx.resume();
                const sorted = [...fingering].sort(function(a,b){return a.note-b.note;});
                const delay = audioMode === 'arpeggio' ? 0.35 : 0.05;
                sorted.forEach(function(f, i) {
                    const osc = ctx.createOscillator(), gain = ctx.createGain();
                    osc.type = 'triangle'; osc.frequency.value = 440 * Math.pow(2, (f.note-69)/12);
                    const start = ctx.currentTime + (i * delay);
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.3, start + 0.01);
                    gain.gain.exponentialRampToValueAtTime(0.001, start + 1.5);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(start); osc.stop(start+2);
                });
            }
            
            function playSingleNote(noteData) {
                if (isMuted || !noteData) return;
                if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                const ctx = audioCtxRef.current;
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator(), gain = ctx.createGain();
                osc.type = 'triangle'; osc.frequency.value = 440 * Math.pow(2, (noteData.note-69)/12);
                const start = ctx.currentTime;
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.4, start + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, start + 1.5);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(start); osc.stop(start+2);
            }

            function playClick(isAccent) {
                if (isMuted) return;
                if (!audioCtxRef.current) return;
                const ctx = audioCtxRef.current;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = isAccent ? 1200 : 800;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.005);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.05);
            }

            function toggleReverseNote(sNum, fret, noteMidi, existingNote) {
                setReverseNotes(function(prev) {
                    if (existingNote) {
                        const isAccidental = [1, 3, 6, 8, 10].indexOf(noteMidi % 12) !== -1;
                        if (isAccidental) {
                            if (existingNote.explicitEnharmonic === 'sharps') {
                                return prev.map(function(n) {
                                    if (n.string === sNum && n.fret === fret) {
                                        return Object.assign({}, n, { explicitEnharmonic: 'flats' });
                                    }
                                    return n;
                                });
                            } else {
                                return prev.filter(function(n) { return !(n.string === sNum && n.fret === fret); });
                            }
                        } else {
                            return prev.filter(function(n) { return !(n.string === sNum && n.fret === fret); });
                        }
                    }
                    const isAccidental = [1, 3, 6, 8, 10].indexOf(noteMidi % 12) !== -1;
                    return [...prev, { string: sNum, fret: fret, note: noteMidi, explicitEnharmonic: isAccidental ? 'sharps' : null }];
                });
                playSingleNote({ note: noteMidi });
            }

                let firstChord = currentOpts.find(function(o) { return o.name === activeExerciseConfig.expectedName; });

                    let prevChord = path[i-1];

                    let sortedOpts = nextOptsArray.map(function(o) {

                            currentDurationMultiplier = studyChords[s.chordIdx].duration;

                     let prevFingering = i > 0 ? newSeq[i-1].fingering : null;
                     
                     if (newSeq[i].isCustom) {
                         if (prevFingering) {
                             newSeq[i] = Object.assign({}, newSeq[i], { dist: getVoiceLeadingDistance(prevFingering, newSeq[i].fingering), prevFingering: prevFingering });
                         } else {
                             newSeq[i] = Object.assign({}, newSeq[i], { dist: 0, prevFingering: null });
                         }
                         continue;
                     }

                     const opts = generateChordData(newSeq[i].queryRoot, newSeq[i].quality, newSeq[i].drop, newSeq[i].bassString, getQualsForTrack(newSeq[i].track), null, newSeq[i].track, notationMode);
                     if (opts.length > 0) {
                         if (prevFingering) {
                             opts.forEach(function(o) { o.dist = getVoiceLeadingDistance(prevFingering, o.fingering); o.prevFingering = prevFingering; });
                             opts.sort(function(a,b) { return a.dist - b.dist; });
                         }
                         
                         let chosen = null;
                         if (linkStrategy === 'fund_to_fund') {
                             chosen = opts.find(function(o) { return o.name === 'Fund.' || o.name.indexOf('1-') === 0 || (o.name.indexOf('3-') === 0 && o.name.indexOf('RL') !== -1); });
                         } else if (linkStrategy === 'keep_inv') {
                             chosen = opts.find(function(o) { return o.name === newSeq[i].name; });
                         }
                         if (!chosen) chosen = opts[0];
                         
                         chosen.vlRank = 1;
                         chosen.track = newSeq[i].track;
                         newSeq[i] = chosen;
                     }
                 }
                 return newSeq;
            }

            function handleToggleCustomNote(sNum, fret, noteMidi, existingNote) {
                setCustomNotes(function(prev) {
                    if (existingNote) return prev.filter(function(n) { return !(n.string === sNum && n.fret === fret); });
                    return [...prev, { string: sNum, fret: fret, note: noteMidi, explicitEnharmonic: null }];
                });
                playSingleNote({ note: noteMidi });
            }

            function addCustomChordToBuilder() {
                if (customNotes.length === 0) return showAlert("Debes seleccionar al menos una nota.");
                const name = customName.trim() || 'Custom';
                const newChord = {
                    isCustom: true,
                    name: 'Personalizado',
                    formattedChordName: name,
                    fingering: customNotes.map(n => ({ string: n.string, fret: n.fret, note: n.note })),
                    prevFingering: null,
                    dist: 0,
                    vlRank: 0,
                    track: 'custom'
                };
                
                let newSeq = [...builderSeq];
                if (editingIndex !== null) {
                    newSeq[editingIndex] = newChord;
                    newSeq = updateSequenceFrom(newSeq, editingIndex);
                    setEditingIndex(null);
                } else {
                    if (newSeq.length > 0) {
                        const prevFingering = newSeq[newSeq.length - 1].fingering;
                        newChord.prevFingering = prevFingering;
                        newChord.dist = getVoiceLeadingDistance(prevFingering, newChord.fingering);
                    }
                    newSeq.push(newChord);
                }
                
                setBuilderSeq(newSeq);
                setShowCustomModal(false);
                setCustomNotes([]);
                setCustomName('');
            }

            function handleAddBuilderStart(chordData) {
                const newData = Object.assign({}, chordData, { prevFingering: null, track: freeTrack });
                setBuilderSeq([newData]);
                playVoicing(chordData.fingering);
            }

            function handleAddBuilderNext() {
                const opts = generateChordData(freeRoot, freeQuality, freeDrop, freeBassString, freeQuals, null, freeTrack, notationMode);
                if (opts.length === 0) {
                    showAlert("No hay digitaciones posibles sin cuerdas al aire para esa configuración.");
                    return;
                }
                const lastFingering = builderSeq[builderSeq.length - 1].fingering;
                const rankedOpts = opts.map(function(o) {
                    return Object.assign({}, o, { dist: getVoiceLeadingDistance(lastFingering, o.fingering), prevFingering: lastFingering });
                }).sort(function(a,b) { return a.dist - b.dist; });
                
                let chosen = null;
                if (linkStrategy === 'fund_to_fund') {
                    chosen = rankedOpts.find(function(o) { 
                        return o.name === 'Fund.' || o.name.indexOf('1-') === 0 || (o.name.indexOf('3-') === 0 && o.name.indexOf('RL') !== -1); 
                    });
                } else if (linkStrategy === 'keep_inv') {
                    chosen = rankedOpts.find(function(o) { return o.name === builderSeq[builderSeq.length - 1].name; });
                }
                
                if (!chosen) {
                    rankedOpts.sort(function(a,b) { return a.dist - b.dist; });
                    chosen = rankedOpts[0];
                }
                
                chosen.vlRank = 1; 
                chosen.track = freeTrack;
                setBuilderSeq([...builderSeq, chosen]);
                playVoicing(chosen.fingering);
            }

            function handleDeleteBuilderChord(idx) {
                let newSeq = builderSeq.filter(function(_, i) { return i !== idx; });
                if (newSeq.length > 0 && idx < newSeq.length) {
                    newSeq = updateSequenceFrom(newSeq, Math.max(0, idx));
                    if (idx === 0) newSeq[0].prevFingering = null; 
                }
                setBuilderSeq(newSeq);
                if (editingIndex === idx) setEditingIndex(null);
            }

            function handleUpdateBuilderChord() {
                const opts = generateChordData(freeRoot, freeQuality, freeDrop, freeBassString, freeQuals, null, freeTrack, notationMode);
                if (opts.length === 0) { showAlert("No hay digitaciones posibles sin cuerdas al aire para esa configuración."); return; }
                
                let newSeq = [...builderSeq];

                opts.forEach(function(o) { o.dist = prevFingering ? getVoiceLeadingDistance(prevFingering, o.fingering) : 0; o.prevFingering = prevFingering; });
                opts.sort(function(a,b) { return a.dist - b.dist; });
                
                let chosen = null;
                if (linkStrategy === 'fund_to_fund') {
                    chosen = opts.find(function(o) { return o.name === 'Fund.' || o.name.indexOf('1-') === 0 || (o.name.indexOf('3-') === 0 && o.name.indexOf('RL') !== -1); });
                } else if (linkStrategy === 'keep_inv') {
                    chosen = opts.find(function(o) { return o.name === newSeq[editingIndex].name; });
                }
                if (!chosen) chosen = opts[0];
                
                chosen.vlRank = 1;
                chosen.track = freeTrack;
                newSeq[editingIndex] = chosen;
                
                newSeq = updateSequenceFrom(newSeq, editingIndex + 1);
                setBuilderSeq(newSeq);
                setEditingIndex(null);
                playVoicing(chosen.fingering);
            }

                                </button>
                            </div>

                            <Tooltip text="Nomenclatura de grados: 2-4-6 o Tensiones 9-11-13">
                                <button onClick={function(){setTensionNotation(!tensionNotation);}} className={"px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center shrink-0 snap-center h-full " + (tensionNotation ? 'text-fuchsia-400 bg-fuchsia-900/20' : 'text-slate-400')}>
                                    <span className="mr-1 md:mr-1.5 font-black text-xs">T</span>
                                    {tensionNotation ? '9-11-13' : '2-4-6'}
                                </button>
                            </Tooltip>
                            
                            <Tooltip text="Alterna entre rasgueo rápido o arpegio nota por nota.">
                                <button onClick={function(){setAudioMode(audioMode === 'strum' ? 'arpeggio' : 'strum');}} className={"px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center shrink-0 snap-center h-full " + (audioMode === 'arpeggio' ? 'text-emerald-400 bg-emerald-900/20' : 'text-slate-400')}>
                                    <Icon name="Play" size={14} className="mr-1 md:mr-1.5"/>
                                    {audioMode === 'strum' ? 'Rasgueo' : 'Arpegio'}
                                </button>
                            </Tooltip>

                            <Tooltip text="Muestra la Tónica teórica para ubicarte visualmente.">
                                <button onClick={function(){setShowRootOverlay(!showRootOverlay);}} className={"px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center shrink-0 snap-center h-full " + (showRootOverlay ? 'text-rose-400 bg-rose-900/20' : 'text-slate-400')}>
                                    <Icon name="Target" size={14} className="mr-1 md:mr-1.5"/>
                                    Tónica
                                </button>
                            </Tooltip>

                            <Tooltip text="Ilumina las notas de la escala correspondiente al acorde.">
                                <button onClick={function(){setShowScales(!showScales);}} className={"px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center shrink-0 snap-center h-full " + (showScales ? 'text-indigo-400 bg-indigo-900/20' : 'text-slate-400')}>
                                    <Icon name="Menu" size={14} className="mr-1 md:mr-1.5"/>
                                    Escala
                                </button>
                            </Tooltip>

                            <Tooltip text="Voice Leading: Muestra el rastro del acorde anterior.">
                                <button onClick={function(){setShowGhostNotes(!showGhostNotes);}} className={"px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center shrink-0 snap-center h-full " + (showGhostNotes ? 'text-sky-400 bg-sky-900/20' : 'text-slate-400')}>
                                    <Icon name="Shuffle" size={14} className="mr-1 md:mr-1.5"/>
                                    Rastro
                                </button>
                            </Tooltip>

                            <Tooltip text="Modo a ciegas: Oculta los diagramas para practicar de oído.">
                                <button onClick={function(){setBlindMode(!blindMode);}} className={"px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center shrink-0 snap-center h-full " + (blindMode ? 'text-amber-400 bg-amber-900/20' : 'text-slate-400')}>
                                    {blindMode ? <Icon name="EyeOff" size={14} className="mr-1 md:mr-1.5"/> : <Icon name="Eye" size={14} className="mr-1 md:mr-1.5"/>}
                                    Ciegas
                                </button>
                            </Tooltip>

                            <div className="snap-center shrink-0 border-l border-slate-800 pl-1.5 md:pl-2 ml-0.5 md:ml-1">
                                <button onClick={function(){setIsMuted(!isMuted);}} className={"px-3 py-2 md:px-4 md:py-2 text-[10px] md:text-[11px] font-bold border border-slate-700 rounded-xl hover:bg-slate-900 transition-colors flex items-center h-full " + (isMuted ? 'text-rose-500' : 'text-emerald-500')}>
                                    {isMuted ? <Icon name="VolumeX" size={14} className="mr-1 md:mr-1.5"/> : <Icon name="Volume2" size={14} className="mr-1 md:mr-1.5"/>}
                                    {isMuted ? 'Off' : 'On'}
                                </button>
                            </div>
                        </div>
                        <div className="text-slate-500/80 text-[9px] md:text-[10px] font-bold tracking-widest uppercase drop-shadow-md bg-[#020617]/50 px-3 py-1 rounded-full">
                            Por Juan Miguel Rios Redondo
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
